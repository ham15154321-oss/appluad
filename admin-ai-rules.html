<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤖 AI 顧問中心 調動規則 — 赫綠設計學院</title>
<script src="auth-check.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  background:linear-gradient(135deg,#050510 0%,#0d1033 40%,#1a0a2e 70%,#050510 100%);
  color:#e8e8e8;
  font-family:'Segoe UI','Microsoft JhengHei',-apple-system,sans-serif;
  padding:20px 24px 60px;
}
.wrap{max-width:1280px;margin:0 auto;}
.head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px;}
.title{font-size:22px;font-weight:900;color:#a78bfa;letter-spacing:2px;text-shadow:0 0 16px rgba(167,139,250,.25);}
.sub{font-size:11px;color:rgba(180,200,240,.5);letter-spacing:1px;}
.btn{padding:8px 14px;border-radius:8px;cursor:pointer;border:none;font-weight:700;font-size:13px;font-family:inherit;}
.btn-primary{background:linear-gradient(135deg,#a78bfa,#4aeaff);color:#03060f;}
.btn-add{background:rgba(0,232,104,.12);border:1px solid rgba(0,232,104,.3);color:#00e868;}
.btn-back{background:rgba(255,255,255,.04);border:1px solid rgba(160,160,200,.2);color:#bda8e8;}
.btn-danger{background:rgba(255,80,80,.1);border:1px solid rgba(255,80,80,.3);color:#ff8a8a;}
.btn-ghost{background:rgba(255,255,255,.04);border:1px solid rgba(160,160,200,.18);color:#bda8e8;}
.btn:hover{filter:brightness(1.1);}

/* layout */
.body{display:grid;grid-template-columns:240px 1fr;gap:18px;}
@media (max-width:780px){.body{grid-template-columns:1fr;}}

/* TOC */
.toc{
  background:rgba(15,20,50,.55);border:1px solid rgba(167,139,250,.18);
  border-radius:12px;padding:14px 10px;backdrop-filter:blur(12px);
  position:sticky;top:14px;align-self:start;max-height:calc(100vh - 30px);overflow-y:auto;
}
.toc-title{font-size:12px;font-weight:700;color:#a78bfa;letter-spacing:2px;padding:0 8px 10px;border-bottom:1px solid rgba(167,139,250,.15);margin-bottom:8px;}
.toc-item{
  padding:8px 10px;border-radius:8px;font-size:13px;cursor:pointer;color:#bda8e8;
  display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;
}
.toc-item:hover{background:rgba(167,139,250,.08);color:#e2d4ff;}
.toc-item.active{background:rgba(167,139,250,.18);color:#fff;font-weight:700;}
.toc-item .cnt{font-size:11px;background:rgba(255,215,0,.15);color:#ffd700;padding:1px 7px;border-radius:6px;}

/* main */
.main{
  background:rgba(15,20,50,.55);border:1px solid rgba(74,234,255,.12);
  border-radius:12px;padding:18px;backdrop-filter:blur(12px);min-height:300px;
}
.cat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(74,234,255,.12);}
.cat-name{font-size:18px;font-weight:800;color:#4aeaff;}
.cat-desc{font-size:12px;color:rgba(180,200,240,.6);margin-top:4px;}

/* rule card */
.rule{
  border:1px solid rgba(160,160,200,.15);border-radius:10px;padding:12px 14px;margin-bottom:10px;
  background:rgba(255,255,255,.02);transition:all .2s;
}
.rule.disabled{opacity:.45;border-style:dashed;}
.rule:hover{border-color:rgba(74,234,255,.35);background:rgba(74,234,255,.03);}
.rule-row1{display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.rule-name{font-weight:700;font-size:14px;color:#e8e8ff;flex:1;}
.rule-id{font-size:10px;color:rgba(160,180,220,.4);font-family:'Courier New',monospace;margin-left:8px;}
.rule-meta{font-size:11px;color:rgba(180,200,240,.5);margin-top:4px;}
.rule-actions{display:flex;gap:6px;align-items:center;margin-left:8px;}
.rule-actions .btn{padding:4px 10px;font-size:11px;}
.rule-detail{
  margin-top:10px;padding:10px 12px;background:rgba(0,0,0,.18);border-radius:8px;
  font-size:12.5px;line-height:1.7;color:#dde6f0;display:none;
}
.rule.expanded .rule-detail{display:block;}
.rule-field{margin-bottom:6px;}
.rule-field strong{color:#a78bfa;display:inline-block;min-width:80px;}
.rule-field code{background:rgba(74,234,255,.08);padding:1px 6px;border-radius:4px;font-size:11px;color:#4aeaff;font-family:'Courier New',monospace;}

/* modal (新增規則) */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;justify-content:center;align-items:center;backdrop-filter:blur(8px);}
.modal-bg.open{display:flex;}
.modal{
  background:linear-gradient(135deg,#0d1033,#1a0a2e);border:1px solid rgba(167,139,250,.3);
  border-radius:14px;padding:24px;max-width:580px;width:90%;max-height:80vh;overflow-y:auto;
}
.modal h3{color:#a78bfa;font-size:18px;margin-bottom:14px;}
.modal label{display:block;font-size:12px;color:rgba(180,200,240,.7);margin:10px 0 4px;font-weight:700;}
.modal input,.modal textarea,.modal select{
  width:100%;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.04);
  border:1px solid rgba(100,160,255,.15);color:#e8e8ff;font-size:13px;font-family:inherit;outline:none;
}
.modal textarea{min-height:70px;resize:vertical;}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:#a78bfa;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}

/* empty */
.empty{padding:40px 20px;text-align:center;color:rgba(180,200,240,.5);font-size:13px;line-height:1.7;}
</style>
</head>
<body>

<div class="wrap">
  <div class="head">
    <div class="title">🤖 AI 顧問中心 調動規則</div>
    <div class="sub">管理員專屬 · 所有 AI 顧問中心會調用的資料來源、提示詞、權限規則一覽</div>
    <div style="flex:1;"></div>
    <button class="btn btn-back" onclick="history.back()">← 回後台</button>
    <button class="btn btn-add" onclick="openAddModal()">＋ 新增規則</button>
  </div>

  <div class="body">
    <!-- TOC -->
    <div class="toc" id="toc"></div>
    <!-- Main -->
    <div class="main" id="main"></div>
  </div>
</div>

<!-- 新增/編輯規則 Modal -->
<div class="modal-bg" id="ruleModal">
  <div class="modal">
    <h3 id="ruleModalTitle">＋ 新增規則</h3>
    <label>📂 類別</label>
    <select id="rmCategory">
      <option value="data">📚 資料調動</option>
      <option value="prompt">🎭 角色提示詞</option>
      <option value="storage">💾 儲存與紀錄</option>
      <option value="permission">🔒 權限規則</option>
      <option value="ui">🎨 UI 規則</option>
      <option value="custom">📝 使用者自訂</option>
    </select>
    <label>🏷️ 規則名稱</label>
    <input id="rmName" placeholder="例：每次對話自動帶入面談率資料">
    <label>📝 描述</label>
    <textarea id="rmDescription" placeholder="這條規則的目的、為什麼需要..."></textarea>
    <label>📍 程式來源（選填，例如 ai-advisor.html → getXxxCtx()）</label>
    <input id="rmSource" placeholder="ai-advisor.html → getXxxCtx()">
    <label>⚡ 觸發條件（選填）</label>
    <input id="rmTrigger" placeholder="例：所有 6 個 AI 功能對話時 / 只有 AI 教練對話時">
    <label>📤 輸出格式（選填）</label>
    <textarea id="rmOutput" placeholder="例：主角名 + 各維度分數 + 總分"></textarea>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeAddModal()">取消</button>
      <button class="btn btn-primary" onclick="saveRule()">儲存</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  ★ AI 顧問中心 調動規則 — 註冊表
//  存放於 localStorage 'ai_advisor_rules_v1'

//  使用者可新增、刪除（軟刪除：enabled=false）、編輯
// ════════════════════════════════════════════════════════════════
const SK_RULES = 'ai_advisor_rules_v1';

const CATEGORIES = {
  data:       { label: '📚 資料調動', desc: 'AI 對話時自動塞入 system prompt 的資料來源（getFullContext 一次組裝）' },

  custom:     { label: '📝 使用者自訂', desc: '黃柏翰自己加的規則' }
};

// 預設規則（首次載入時寫入 localStorage）— 反映目前程式碼真實狀態
const DEFAULT_RULES = [

  { id:'data_360',      category:'data', name:'360 度評估資料', enabled:true,
    description:'每次 AI 對話自動帶入該主角的六大維度評分（會議、績效管理、人員管理、日常輔導、小組發展、宣誓），含主管/自評/區主管/總經理/同儕/部屬六種角色。',
    sourceFunction:'ai-advisor.html → getScoreCtx() / get360FullCtx()',
    triggerCondition:'所有 6 個 AI 功能對話時',
    output:'主角名 + 6 維度分數 + 總分 + 360 完整備註' },

  { id:'data_perf_latest', category:'data', name:'業績排名（最近一次同步）', enabled:true,
    description:'帶入學院排名、業務排名、正式小組績效、儲備小組績效（從 EIP 同步的最新版）。各取前 N 名。',
    sourceFunction:'ai-advisor.html → getPerfCtx()',

    output:'學院 Top10、業務 Top10、正式組 Top15、儲備組 Top15' },

    description:'從業績數據中心 → 激勵 →「📥 匯入成績單」存檔的歷史月份資料。AI 可跨月比較、回溯查詢。',
    sourceFunction:'ai-advisor.html → getPerfCtx() 內部讀 motiv_archive',
    triggerCondition:'所有 AI 功能對話時，且使用者已匯入過至少一個月份成績單',
    output:'已匯入月份清單 + 每月各排行榜筆數' },

  { id:'data_perf_topgroup_compare', category:'data', name:'跨月正式小組 Top 5 比較', enabled:true,
    description:'從多月份成績單存檔抽出每月正式小組前 5 名，做橫向比較，方便 AI 回答「某組這個月跟上個月差多少」這類問題。',

  { id:'data_channel', category:'data', name:'通路績效資料', enabled:true,

    triggerCondition:'所有 6 個 AI 功能對話時',

  { id:'data_fire', category:'data', name:'火種九宮格', enabled:true,

  { id:'data_achieve', category:'data', name:'成就紀錄', enabled:true,
    description:'帶入主角已解鎖的成就（火種、季度勳章、組長獎等）。',
    sourceFunction:'ai-advisor.html → getAchieveCtx()',
    triggerCondition:'所有 6 個 AI 功能對話時',
    output:'已解鎖成就清單 + 取得時間' },

  { id:'data_rules', category:'data', name:'團隊鐵律', enabled:true,

    sourceFunction:'ai-advisor.html → getOtherCharsCtx()',
    triggerCondition:'所有 6 個 AI 功能對話時',

  { id:'data_teamkb', category:'data', name:'團隊知識庫（appedu_team_knowledge_base）', enabled:true,
    description:'從 AI 團隊宣言累積的公司知識庫，越餵越聰明。',
    sourceFunction:'ai-advisor.html → 直接讀 SK.teamkb',
    triggerCondition:'所有 6 個 AI 功能對話時',
    output:'知識庫全文' },

  { id:'data_monthly_perf_8sheets', category:'data', name:'業績數據中心 — 月績效中心 8 大報表', enabled:true,
    description:'AI 對話時自動帶入業績數據中心 → 每月績效的 8 個報表 row 級資料：❶ 通路名單來源分析、❷ 通路業績、❸ 業務個人績效、❹ 正式小組業績總表、❺ 學院績效總表、❻ 繳費項目分析、❼ 收支分析、❽ 課程銷售分析。所有月份的可用性會以摘要形式呈現；最近 3 個有資料的月份會展開到 row 級資料（每個 sheet 最多 50 筆，全欄位非空者帶入）。\n\n用例：問「4 月業務個人績效面談率前 5 名」、「2 月各通路業績比較」、「Q1 學院績效總表前 3 名」這類具體問題時，AI 才能算得出來。\n\n資料來源是 localStorage.mp_data_v1（全主角共享），結構為 { "1": { sheet1: [...], ..., sheet8: [...] }, ..., "12": {...} }。',

  { id:'storage_chat_firestore', category:'storage', name:'AI 對話寫入 Firestore', enabled:true,

function loadRules(){
  try{
    var raw = localStorage.getItem(SK_RULES);
    if(!raw){
      // 首次：寫入預設
      var initial = DEFAULT_RULES.map(function(r){
        return Object.assign({}, r, { addedBy:'初始系統規則', addedAt: Date.now() });
      });
      localStorage.setItem(SK_RULES, JSON.stringify(initial));
      return initial;
    }
    var arr = JSON.parse(raw) || [];
    // 補進新加入的預設規則（id 不在現有清單中的）
    var existingIds = arr.map(function(r){ return r.id; });
    var added = false;
    DEFAULT_RULES.forEach(function(d){
      if(existingIds.indexOf(d.id) < 0){
        arr.push(Object.assign({}, d, { addedBy:'系統補登', addedAt: Date.now() }));
        added = true;
      }
    });
    if(added) localStorage.setItem(SK_RULES, JSON.stringify(arr));
    return arr;
  }catch(e){ return DEFAULT_RULES.slice(); }
}
function saveRules(arr){
  try{ localStorage.setItem(SK_RULES, JSON.stringify(arr || [])); }catch(e){ alert('❌ 儲存失敗：'+e.message); }
}

var currentCategory = 'data'; // 預設打開「資料調動」

function renderTOC(){
  var rules = loadRules();
  var counts = {};
  Object.keys(CATEGORIES).forEach(function(k){ counts[k] = 0; });
  rules.forEach(function(r){ counts[r.category] = (counts[r.category]||0) + 1; });

  var html = '<div class="toc-title">📋 目錄</div>';
  Object.keys(CATEGORIES).forEach(function(k){
    var c = counts[k] || 0;
    html += '<div class="toc-item'+(currentCategory===k?' active':'')+'" onclick="switchCategory(\''+k+'\')">'
      + '<span>'+CATEGORIES[k].label+'</span>'
      + '<span class="cnt">'+c+'</span>'
      + '</div>';
  });
  // ★ 教育 AI 顧問規則（範例集）— 在目錄下方
  html += '<div style="margin-top:14px;padding-top:12px;border-top:1px dashed rgba(167,139,250,.25);"></div>';
  html += '<div class="toc-item'+(currentCategory==='examples'?' active':'')+'" onclick="switchCategory(\'examples\')" style="background:'+(currentCategory==='examples'?'rgba(255,215,0,.18)':'rgba(255,215,0,.06)')+';color:'+(currentCategory==='examples'?'#ffd700':'#ffd76b')+';border:1px solid rgba(255,215,0,.3);">'
    + '<span>💡 教育 AI 顧問規則</span>'

    + '</div>';

  html += '<div style="margin-top:20px;padding:14px 16px;background:linear-gradient(135deg,rgba(167,139,250,.08),rgba(74,234,255,.05));border:1px solid rgba(167,139,250,.25);border-radius:10px;font-size:12.5px;line-height:1.7;color:#bda8e8;text-align:center;">';
  html += '🎓 <b style="color:#a78bfa;">這 30 條是起點，不是終點。</b><br>';
  html += '你跟 Claude 共事越多次，你會越知道怎麼描述你想要的 AI 行為。<br>';
  html += '想到任何「AI 應該這樣回答」「AI 應該知道這件事」「AI 不該說這種話」，<br>';
  html += '都可以直接跟 Claude 說，不必拘泥於這 30 條範例。';
  html += '</div>';

  document.getElementById('main').innerHTML = html;
}

// 一鍵複製範例 prompt
function copyExample(idx, btnEl){
  var ex = EDU_EXAMPLES[idx - 1];
  if(!ex) return;
  var text = ex.prompt;
  // 嘗試現代 API
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){
      _flashCopied(btnEl);
    }).catch(function(){
      _fallbackCopy(text, btnEl);
    });
  } else {
    _fallbackCopy(text, btnEl);
  }
}
function _flashCopied(btnEl){
  if(!btnEl) return;
  var orig = btnEl.textContent;
  btnEl.textContent = '✅ 已複製';
  btnEl.style.background = 'linear-gradient(135deg,#00e868,#4aeaff)';
  setTimeout(function(){
    btnEl.textContent = orig;
    btnEl.style.background = '';
  }, 1500);
}
function _fallbackCopy(text, btnEl){
  // 老瀏覽器 fallback
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand('copy'); _flashCopied(btnEl); }catch(e){ alert('複製失敗，請手動框選文字'); }
  document.body.removeChild(ta);
}

function switchCategory(k){ currentCategory = k; renderTOC(); renderMain(); }

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderMain(){
  // ★ 分流：點到「教育 AI 顧問規則」時，渲染 30 個範例頁面
  if(currentCategory === 'examples'){ renderExamples(); return; }

  var rules = loadRules();
  var cat = CATEGORIES[currentCategory];
  var inCat = rules.filter(function(r){ return r.category === currentCategory; });

  var html = '<div class="cat-header"><div>';
  html += '<div class="cat-name">'+cat.label+'</div>';
  html += '<div class="cat-desc">'+cat.desc+'</div>';
  html += '</div>';
  html += '<div style="font-size:11px;color:rgba(180,200,240,.5);">共 '+inCat.length+' 條</div></div>';

  if(!inCat.length){
    html += '<div class="empty">這個類別還沒有規則。<br><br>點右上角「＋ 新增規則」建立。</div>';
  } else {
    inCat.forEach(function(r){
      html += '<div class="rule'+(r.enabled===false?' disabled':'')+'" id="rule_'+r.id+'">';
      html += '<div class="rule-row1" onclick="toggleRule(\''+r.id+'\')">';
      html += '<div style="flex:1;">';
      html += '<div class="rule-name">'+esc(r.name)+(r.enabled===false?' <span style="color:#ff8a8a;font-size:10px;font-weight:600;">[已停用]</span>':'')+'<span class="rule-id">'+r.id+'</span></div>';
      html += '<div class="rule-meta">'+esc(r.description||'').slice(0,80)+(r.description&&r.description.length>80?'…':'')+'</div>';
      html += '</div>';
      html += '<div class="rule-actions" onclick="event.stopPropagation();">';
      if(r.enabled===false){
        html += '<button class="btn btn-add" onclick="toggleEnabled(\''+r.id+'\')">啟用</button>';
      } else {
        html += '<button class="btn btn-ghost" onclick="toggleEnabled(\''+r.id+'\')">停用</button>';
      }
      html += '<button class="btn btn-danger" onclick="deleteRule(\''+r.id+'\')">🗑 刪除</button>';
      html += '</div>';
      html += '</div>';
      // 詳細
      html += '<div class="rule-detail">';
      html += '<div class="rule-field"><strong>📝 描述</strong>'+esc(r.description||'(無)')+'</div>';
      if(r.sourceFunction) html += '<div class="rule-field"><strong>📍 程式來源</strong><code>'+esc(r.sourceFunction)+'</code></div>';
      if(r.triggerCondition) html += '<div class="rule-field"><strong>⚡ 觸發條件</strong>'+esc(r.triggerCondition)+'</div>';
      if(r.output) html += '<div class="rule-field"><strong>📤 輸出格式</strong>'+esc(r.output)+'</div>';
      var addedDate = r.addedAt ? new Date(r.addedAt).toLocaleString('zh-TW') : '未記錄';
      html += '<div class="rule-field"><strong>🕒 加入時間</strong>'+addedDate+(r.addedBy?' · '+esc(r.addedBy):'')+'</div>';
      html += '</div>';
      html += '</div>';
    });
  }

  document.getElementById('main').innerHTML = html;
}

function toggleRule(id){
  var el = document.getElementById('rule_'+id);
  if(el) el.classList.toggle('expanded');
}

function toggleEnabled(id){
  var arr = loadRules();
  var r = arr.find(function(x){ return x.id===id; });
  if(!r) return;
  r.enabled = (r.enabled===false);
  saveRules(arr);
  renderMain(); renderTOC();
}

function deleteRule(id){
  if(!confirm('確定刪除這條規則？\n\n（提醒：刪除後僅從清單移除，但程式碼裡的真實邏輯仍會執行。要真正關閉某條規則，請改為「停用」並通知 Claude 修改程式。）'))return;
  var arr = loadRules().filter(function(x){ return x.id!==id; });
  saveRules(arr);
  renderMain(); renderTOC();
}

// ════════════════════════════════════════════════════════════════
//  新增規則
// ════════════════════════════════════════════════════════════════
function openAddModal(){
  document.getElementById('rmCategory').value = currentCategory==='custom' ? 'custom' : currentCategory;
  document.getElementById('rmName').value = '';
  document.getElementById('rmDescription').value = '';
  document.getElementById('rmSource').value = '';
  document.getElementById('rmTrigger').value = '';
  document.getElementById('rmOutput').value = '';
  document.getElementById('ruleModal').classList.add('open');
}
function closeAddModal(){ document.getElementById('ruleModal').classList.remove('open'); }
function saveRule(){
  var name = document.getElementById('rmName').value.trim();
  if(!name){ alert('請填寫規則名稱'); return; }
  var newRule = {
    id: 'rule_user_' + Date.now(),
    category: document.getElementById('rmCategory').value,
    name: name,
    description: document.getElementById('rmDescription').value.trim(),
    sourceFunction: document.getElementById('rmSource').value.trim(),
    triggerCondition: document.getElementById('rmTrigger').value.trim(),
    output: document.getElementById('rmOutput').value.trim(),
    enabled: true,
    addedBy: '黃柏翰手動新增',
    addedAt: Date.now()
  };
  var arr = loadRules();
  arr.push(newRule);
  saveRules(arr);
  closeAddModal();
  currentCategory = newRule.category;
  renderTOC(); renderMain();
}

// ESC 關閉 modal
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape'){
    if(document.getElementById('ruleModal').classList.contains('open')) closeAddModal();
  }
});

// 初始化
renderTOC();
renderMain();
</script>
