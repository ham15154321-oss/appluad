<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歷練各主委 — 功能主委發展地圖</title>
<style>
:root{
  --bg:#03060f;--card:rgba(12,22,50,.85);--border:rgba(100,180,255,.12);--border-hi:rgba(74,234,255,.3);
  --text:#c0dcff;--dim:#4a6a9a;--bright:#e8f0ff;--accent:#4aeaff;--gold:#ffd700;
  --c1:#ff6b6b;--c2:#fbbf24;--c3:#4ade80;--c4:#60a5fa;--c5:#c084fc;--c6:#f472b6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Noto Sans TC','PingFang TC',sans-serif;background:radial-gradient(ellipse at 20% 30%,#0d1b3e 0%,#070d1f 50%,var(--bg) 100%);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── 大螢幕容器約束 ── */
.page-container{max-width:1200px;margin:0 auto;}

/* ── Header ── */
.hdr{background:rgba(10,18,40,.9);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;max-width:1200px;margin:0 auto;}
.hdr-title{display:flex;align-items:center;gap:10px;}
.hdr-title .icon{font-size:22px;}
.hdr-title h1{font-size:17px;font-weight:800;background:linear-gradient(135deg,var(--gold),#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hdr-title .badge{font-size:10px;color:var(--dim);border:1px solid var(--border);border-radius:20px;padding:2px 10px;}
.hdr-actions{display:flex;gap:8px;}
.hdr-btn{padding:7px 14px;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,.05);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;}
.hdr-btn:hover{background:rgba(74,234,255,.1);border-color:var(--border-hi);color:var(--accent);}

/* ── Progress Overview ── */
.overview{display:flex;gap:12px;padding:16px 20px;flex-wrap:wrap;justify-content:center;}
.ov-card{flex:1;min-width:150px;max-width:280px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;position:relative;overflow:hidden;transition:all .3s;}
.ov-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.ov-card:nth-child(1)::before{background:var(--c1);}
.ov-card:nth-child(2)::before{background:var(--c2);}
.ov-card:nth-child(3)::before{background:var(--c3);}
.ov-card:nth-child(4)::before{background:var(--c4);}
.ov-card:nth-child(5)::before{background:var(--c5);}
.ov-card .ov-icon{font-size:28px;margin-bottom:6px;}
.ov-card .ov-name{font-size:13px;font-weight:700;color:var(--bright);}
.ov-card .ov-status{font-size:11px;margin-top:4px;}
.ov-card .ov-check{font-size:20px;margin-top:6px;}
.ov-card.done{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.06);}

/* ── Total Progress ── */
.total-progress{padding:0 20px 16px;text-align:center;}
.tp-bar-wrap{background:rgba(255,255,255,.06);border-radius:10px;height:10px;overflow:hidden;margin-top:8px;}
.tp-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--c1),var(--c2),var(--c3),var(--c4),var(--c5));transition:width .5s ease;}
.tp-label{font-size:12px;color:var(--dim);margin-top:4px;}
.tp-big{font-size:24px;font-weight:800;color:var(--gold);}

/* ── Role Sections ── */
.role-section{margin:0 16px 20px;background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all .3s;max-width:100%;}
.role-section.collapsed .rs-body{display:none;}
.rs-header{display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer;transition:all .2s;user-select:none;}
.rs-header:hover{background:rgba(255,255,255,.03);}
.rs-color{width:6px;height:40px;border-radius:3px;flex-shrink:0;}
.rs-icon{font-size:28px;}
.rs-info{flex:1;}
.rs-name{font-size:16px;font-weight:800;color:var(--bright);}
.rs-sub{font-size:11px;color:var(--dim);margin-top:2px;}
.rs-toggle{font-size:16px;color:var(--dim);transition:transform .3s;}
.role-section:not(.collapsed) .rs-toggle{transform:rotate(180deg);}
.rs-done-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;}
.rs-done-badge.yes{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.3);}
.rs-done-badge.no{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2);}

.rs-body{padding:0 20px 20px;}

/* Completion bar */
.comp-bar{display:flex;align-items:center;gap:12px;padding:14px 16px;background:rgba(255,255,255,.03);border-radius:10px;margin-bottom:16px;flex-wrap:wrap;}
.comp-check{display:flex;align-items:center;gap:8px;}
.comp-check label{font-size:13px;font-weight:700;color:var(--bright);cursor:pointer;}
.comp-check input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent);cursor:pointer;}
.comp-dur{display:flex;align-items:center;gap:6px;}
.comp-dur label{font-size:12px;color:var(--dim);}
.comp-dur input{width:60px;padding:5px 8px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:6px;color:var(--bright);font-size:13px;text-align:center;outline:none;font-family:inherit;}
.comp-dur select{padding:5px 8px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:6px;color:var(--bright);font-size:12px;outline:none;font-family:inherit;}

/* ── Mind Map Branches ── */
.branch-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;max-width:100%;}
.branch{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.branch-header{padding:12px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
.branch-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.branch-title{font-size:13px;font-weight:700;color:var(--bright);flex:1;}
.branch-add{background:transparent;border:none;color:var(--accent);cursor:pointer;font-size:14px;padding:2px 6px;}
.branch-del{background:transparent;border:none;color:rgba(255,80,80,.35);cursor:pointer;font-size:12px;padding:2px 6px;transition:color .2s;}
.branch:hover .branch-del{color:rgba(255,80,80,.7);}
.branch-del:hover{color:#ff4444!important;}
.branch-items{padding:10px 14px;}
.b-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.b-item:last-child{border-bottom:none;}
.b-bullet{color:var(--dim);font-size:11px;margin-top:3px;flex-shrink:0;}
.b-text{flex:1;font-size:12px;color:#94a3b8;line-height:1.6;cursor:text;padding:2px 4px;border-radius:4px;transition:background .2s;min-height:20px;white-space:pre-wrap;word-break:break-word;}
.b-text:hover{background:rgba(255,255,255,.04);}
.b-text:focus{background:rgba(74,234,255,.06);outline:none;color:var(--bright);}
.b-del{background:transparent;border:none;color:rgba(255,80,80,.4);cursor:pointer;font-size:11px;padding:2px;opacity:0;transition:opacity .2s;}
.b-item:hover .b-del{opacity:1;}

/* ── Toast ── */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-60px);padding:10px 24px;border-radius:10px;font-size:13px;font-weight:600;background:#166534;color:#4ade80;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.4);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:600px){
  .overview{flex-direction:column;}
  .ov-card{max-width:none;}
  .branch-grid{grid-template-columns:1fr;}
  .hdr-inner{flex-direction:column;gap:8px;}
}

@media(max-width:480px){
  .overview{flex-direction:column;}
  .ov-card{min-width:100%;max-width:none;padding:10px;}
  .branch-grid{grid-template-columns:minmax(240px,1fr);}
  .hdr-title h1{font-size:14px;}
  .rs-name{font-size:14px;}
  .rs-sub{font-size:10px;}
  .rs-header{padding:12px 16px;}
  .branch-title{font-size:12px;}
  .b-text{font-size:11px;}
  .hdr-btn{padding:5px 10px;font-size:11px;}
  .ov-card .ov-icon{font-size:24px;}
  .ov-card .ov-name{font-size:12px;}
  body{padding:8px;}
  .container{padding:8px;}
  .role-section{margin:0 8px 16px;}
}
</style>

// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
let D = loadData();

function loadData(){
  try{const r=localStorage.getItem(getSK());if(r){const d=JSON.parse(r);if(d.roles)return d;}}catch(e){}
  return getDefault();
}
function saveAll(){
  try{localStorage.setItem(getSK(),JSON.stringify(D));showToast('💾 已儲存');}catch(e){showToast('⚠ 儲存失敗');}
}

let _autoTimer=null;
function autoSave(){clearTimeout(_autoTimer);_autoTimer=setTimeout(saveAll,800);}

// ════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════
function render(){
  renderOverview();
  renderProgress();
  renderRoleSections();
}

function renderOverview(){
  const el=document.getElementById('overview');
  el.innerHTML=D.roles.map((r,i)=>`
    <div class="ov-card${r.done?' done':''}" onclick="scrollToRole(${i})">
      <div class="ov-icon">${r.icon}</div>
      <div class="ov-name">${r.name}</div>
      <div class="ov-status" style="color:${r.done?'#4ade80':'#f87171'};">${r.done?'✅ 已完成'+(r.duration?' · '+r.duration+r.durationUnit:''):'⏳ 尚未完成'}</div>
    </div>
  `).join('');
}

function renderProgress(){
  const count=D.roles.filter(r=>r.done).length;
  document.getElementById('tpBig').textContent=count+' / 5';
  document.getElementById('tpFill').style.width=(count/5*100)+'%';
}

function renderRoleSections(){
  const el=document.getElementById('roleSections');
  el.innerHTML=D.roles.map((r,i)=>{
    const colorVal=['#ff6b6b','#fbbf24','#4ade80','#60a5fa','#c084fc'][i];
    return `
    <div class="role-section" id="role_${i}">
      <div class="rs-header" onclick="toggleRole(${i})">
        <div class="rs-color" style="background:${colorVal};"></div>
        <div class="rs-icon">${r.icon}</div>
        <div class="rs-info">
          <div class="rs-name">${r.name}</div>
          <div class="rs-sub">${r.branches.length} 個支線 · ${r.branches.reduce((s,b)=>s+b.items.length,0)} 項職責</div>
        </div>
        <span class="rs-done-badge ${r.done?'yes':'no'}">${r.done?'✅ 已完成':'⏳ 未完成'}</span>
        <span class="rs-toggle">▼</span>
      </div>
      <div class="rs-body">
        <!-- 完成狀態 -->
        <div class="comp-bar">
          <div class="comp-check">
            <input type="checkbox" id="chk_${i}" ${r.done?'checked':''} onchange="toggleDone(${i},this.checked)">
            <label for="chk_${i}">已完成此職務歷練</label>
          </div>
          <div class="comp-dur">
            <label>擔任時長：</label>
            <input type="text" value="${r.duration||''}" placeholder="例：6" oninput="D.roles[${i}].duration=this.value;autoSave();renderOverview();renderProgress();">
            <select onchange="D.roles[${i}].durationUnit=this.value;autoSave();renderOverview();">
              <option value="月"${r.durationUnit==='月'?' selected':''}>月</option>
              <option value="年"${r.durationUnit==='年'?' selected':''}>年</option>
              <option value="週"${r.durationUnit==='週'?' selected':''}>週</option>
            </select>
          </div>
        </div>
        <!-- 支線 -->
        <div class="branch-grid">
          ${r.branches.map((b,bi)=>`
            <div class="branch">
              <div class="branch-header">
                <div class="branch-dot" style="background:${colorVal};"></div>
                <div class="branch-title" contenteditable="true" onblur="updateBranchTitle(${i},${bi},this.textContent)">${esc(b.title)}</div>
                <button class="branch-add" onclick="addItem(${i},${bi})" title="新增項目">＋</button>
                <button class="branch-del" onclick="delBranch(${i},${bi})" title="刪除此支線">🗑</button>
              </div>
              <div class="branch-items">
                ${b.items.map((item,ii)=>`
                  <div class="b-item">
                    <span class="b-bullet">◆</span>
                    <div class="b-text" contenteditable="true" onblur="updateItem(${i},${bi},${ii},this)">${esc(item)}</div>
                    <button class="b-del" onclick="delItem(${i},${bi},${ii})">✕</button>
                  </div>
                `).join('')}
              </div>
            </div>
          `).join('')}
          <div class="branch" style="border-style:dashed;display:flex;align-items:center;justify-content:center;min-height:80px;cursor:pointer;opacity:.5;transition:opacity .2s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.5" onclick="addBranch(${i})">
            <div style="text-align:center;color:var(--dim);font-size:13px;">＋ 新增支線</div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════════════
// ACTIONS
// ════════════════════════════════════════════════
function toggleRole(i){
  document.getElementById('role_'+i).classList.toggle('collapsed');
}

function scrollToRole(i){
  const el=document.getElementById('role_'+i);
  if(el.classList.contains('collapsed')) el.classList.remove('collapsed');
  el.scrollIntoView({behavior:'smooth',block:'start'});
}

function toggleDone(i,checked){
  D.roles[i].done=checked;
  autoSave();renderOverview();renderProgress();
  // Update badge inline
  const section=document.getElementById('role_'+i);
  const badge=section.querySelector('.rs-done-badge');
  badge.className='rs-done-badge '+(checked?'yes':'no');
  badge.textContent=checked?'✅ 已完成':'⏳ 未完成';
}

function updateBranchTitle(ri,bi,text){
  D.roles[ri].branches[bi].title=text.trim();
  autoSave();
}

function updateItem(ri,bi,ii,el){
  D.roles[ri].branches[bi].items[ii]=getEditText(el);
  autoSave();
}

function addItem(ri,bi){
  D.roles[ri].branches[bi].items.push('（新增項目）');
  autoSave();renderRoleSections();
}

function delItem(ri,bi,ii){
  D.roles[ri].branches[bi].items.splice(ii,1);
  autoSave();renderRoleSections();
}

function addBranch(ri){
  const name=prompt('支線名稱：');
  if(!name) return;
  D.roles[ri].branches.push({title:name,items:['（新增項目）']});
  autoSave();renderRoleSections();
}

function delBranch(ri,bi){
  const b=D.roles[ri].branches[bi];
  const hasContent=b.items.some(item=>item.trim()&&item.trim()!=='（新增項目）');
  if(hasContent){
    if(!confirm('「'+b.title+'」支線有內容，確定要刪除嗎？')) return;
  }
  D.roles[ri].branches.splice(bi,1);
  autoSave();renderRoleSections();
  showToast('🗑 已刪除支線');
}

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getEditText(el){return (el.innerHTML||'').replace(/<br\s*\/?>/gi,'\n').replace(/<[^>]+>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').trim();}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ════════════════════════════════════════════════
// 上一頁（返回九宮格）
// ════════════════════════════════════════════════
function goBack(){
  saveAll();
  try{ if(parent && parent.closeCommittee){ parent.closeCommittee(); return; } }catch(e){}
  try{ parent.postMessage({action:'closeCommittee'},'*'); }catch(e2){}
}
