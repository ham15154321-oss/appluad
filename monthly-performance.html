<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月度績效系統 - 遊戲化實踐版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1040 50%, #0d1b3e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            position: relative;
            z-index: 10;
        }

        .back-btn {
            background: rgba(15, 20, 60, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(100, 180, 255, 0.15);
            color: #ffd700;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .back-btn:hover {
            background: rgba(30, 40, 100, 0.9);
            border-color: rgba(100, 180, 255, 0.3);
            transform: scale(1.05);
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            flex: 1;
        }

        .import-btn {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #0a0e27;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .import-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.3);
        }

        .import-btn:active {
            transform: translateY(0);
        }

        #fileInput {
            display: none;
        }

        /* Month Navigation */
        .month-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            background: rgba(15, 20, 60, 0.5);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(100, 180, 255, 0.1);
        }

        .month-btn {
            padding: 10px 16px;
            border: 1px solid rgba(100, 180, 255, 0.15);
            background: rgba(15, 20, 60, 0.85);
            color: #b0b0b0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            min-width: 50px;
            text-align: center;
        }

        .month-btn:hover {
            border-color: rgba(100, 180, 255, 0.3);
            background: rgba(30, 40, 100, 0.9);
            color: #ffd700;
        }

        .month-btn.active {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #0a0e27;
            border-color: #ffd700;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }

        /* Data Tabs */
        .data-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .data-tab {
            padding: 10px 16px;
            border: 1px solid rgba(100, 180, 255, 0.15);
            background: rgba(15, 20, 60, 0.85);
            color: #b0b0b0;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
            font-size: 13px;
            font-weight: 500;
        }

        .data-tab:hover {
            border-color: rgba(100, 180, 255, 0.3);
            background: rgba(30, 40, 100, 0.9);
        }

        .data-tab.active {
            background: rgba(100, 150, 255, 0.2);
            color: #ffd700;
            border-color: rgba(100, 180, 255, 0.5);
        }

        /* Analysis View Tabs */
        .analysis-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .analysis-tab {
            padding: 8px 14px;
            border: 1px solid rgba(100, 180, 255, 0.15);
            background: rgba(15, 20, 60, 0.85);
            color: #b0b0b0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .analysis-tab:hover {
            border-color: rgba(100, 180, 255, 0.3);
            background: rgba(30, 40, 100, 0.9);
        }

        .analysis-tab.active {
            background: rgba(100, 150, 255, 0.2);
            color: #ffd700;
            border-color: rgba(100, 180, 255, 0.5);
        }

        /* Content Card */
        .content-card {
            background: rgba(15, 20, 60, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(100, 180, 255, 0.15);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }

        /* Table Styles */
        .table-wrapper {
            overflow-x: auto;
            background: rgba(10, 15, 50, 0.5);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(100, 180, 255, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: rgba(50, 80, 150, 0.4);
            color: #ffd700;
            padding: 12px 10px;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid rgba(100, 180, 255, 0.2);
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            min-width: 80px;
            position: relative;
        }

        th:hover {
            background: rgba(70, 100, 180, 0.5);
        }

        th .sort-indicator {
            margin-left: 6px;
            font-size: 11px;
            display: inline-block;
            width: 16px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid rgba(100, 180, 255, 0.1);
            text-align: left;
        }

        tr:nth-child(even) {
            background: rgba(25, 35, 90, 0.3);
        }

        tr:hover {
            background: rgba(50, 80, 150, 0.3);
        }

        td.total-row {
            font-weight: 600;
            background: rgba(100, 150, 255, 0.1);
            color: #ffd700;
        }

        td.rank-1 { background: rgba(255, 215, 0, 0.1); }
        td.rank-2 { background: rgba(200, 200, 200, 0.08); }
        td.rank-3 { background: rgba(205, 127, 50, 0.08); }

        .highlight-high {
            color: #00ff88;
            font-weight: 600;
        }

        .highlight-low {
            color: #ff4466;
            font-weight: 600;
        }

        /* Analysis Content */
        .analysis-view {
            display: none;
        }

        .analysis-view.active {
            display: block;
        }

        .analysis-text {
            line-height: 1.8;
            color: #d0d0d0;
            margin-bottom: 15px;
        }

        .analysis-item {
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(50, 80, 150, 0.2);
            border-left: 3px solid #ffd700;
            border-radius: 6px;
        }

        .analysis-label {
            color: #ffd700;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .analysis-value {
            color: #d0d0d0;
            font-size: 13px;
        }

        /* Distribution Chart */
        .distribution-chart {
            display: flex;
            gap: 2px;
            align-items: flex-end;
            height: 100px;
            margin-bottom: 20px;
        }

        .distribution-bar {
            flex: 1;
            background: linear-gradient(180deg, #ffd700 0%, #ffed4e 100%);
            border-radius: 4px 4px 0 0;
            min-height: 5px;
            position: relative;
            cursor: help;
        }

        .distribution-bar:hover {
            opacity: 0.8;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #808080;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .empty-state-text {
            font-size: 16px;
            color: #a0a0a0;
        }

        /* Loading State */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(100, 180, 255, 0.2);
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .title {
                font-size: 20px;
            }

            .content-card {
                padding: 20px;
            }

            .data-tabs {
                flex-wrap: wrap;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 8px 6px;
                min-width: 60px;
            }

            .header {
                flex-wrap: wrap;
                gap: 10px;
            }
        }

        /* Scrollbar Styling */
        .table-wrapper::-webkit-scrollbar {
            height: 8px;
        }

        .table-wrapper::-webkit-scrollbar-track {
            background: rgba(25, 35, 90, 0.3);
        }

        .table-wrapper::-webkit-scrollbar-thumb {
            background: rgba(100, 180, 255, 0.3);
            border-radius: 4px;
        }

        .table-wrapper::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 180, 255, 0.5);
        }

        /* Status Messages */
        .status-message {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-success {
            background: rgba(0, 255, 136, 0.15);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .status-error {
            background: rgba(255, 68, 102, 0.15);
            color: #ff4466;
            border: 1px solid rgba(255, 68, 102, 0.3);
        }

        .status-info {
            background: rgba(100, 150, 255, 0.15);
            color: #64b0ff;
            border: 1px solid rgba(100, 150, 255, 0.3);
        }
    </style>
<script src="./auth-check.js"></script>
<script defer src="./firebase-sync.js"></script>
<link rel="stylesheet" href="day-mode.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <button class="back-btn" onclick="window.parent.postMessage({type:'closeIframe'},'*')">←</button>
            <h1 class="title">📅 每月績效</h1>
            <button class="import-btn" onclick="document.getElementById('fileInput').click()">
                📥 匯入 Excel
            </button>
            <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleFileImport(event)">
        </div>

        <!-- Status Message -->
        <div id="statusMessage"></div>

        <!-- Month Navigation -->
        <div class="month-nav" id="monthNav"></div>

        <!-- Data Tabs -->
        <div class="data-tabs" id="dataTabs"></div>

        <!-- Analysis Tabs -->
        <div class="analysis-tabs" id="analysisTabs"></div>

        <!-- Content Card -->
        <div class="content-card" id="contentCard"></div>
    </div>

    <script>
        // ==========================================
        // Constants & Utilities
        // ==========================================
        const SHEET_NAMES = [
            { id: 1, name: '通路名單來源分析', emoji: '❶', matchKeys: ['❶','通路名單來源分析'] },
            { id: 2, name: '通路業績', emoji: '❷', matchKeys: ['❷','通路業績'] },
            { id: 3, name: '業務個人績效', emoji: '❸', matchKeys: ['❸','業務個人績效'] },
            { id: 4, name: '正式小組業績總表', emoji: '❹', matchKeys: ['❹','正式小組業績總表','小組業績'] },
            { id: 5, name: '學院績效總表', emoji: '❺', matchKeys: ['❺','學院績效總表','學院績效'] },
            { id: 6, name: '繳費項目分析', emoji: '❻', matchKeys: ['❻','繳費項目分析','繳費項目'] },
            { id: 7, name: '收支分析', emoji: '❼', matchKeys: ['❼','收支分析'] },
            { id: 8, name: '課程銷售分析', emoji: '❽', matchKeys: ['❽','課程銷售分析','課程銷售'] }
        ];

        // All academy names for filtering
        const ALL_ACADEMIES = ['站前學院','站二學院','館前學院','板橋學院','站前二部','東區二部',
            '中壢學院','中壢二部','中壢三部','台中學院','台中二部','台中三部','高雄建國',
            'OBO個別指導','DATE線上(日琪)','東區學院'];

        const CURRENCY_COLUMNS = [
            '業績Ⓐ', '業績Ⓑ', '個人目標', '合計業績', '退費金額',
            '總業績', '總計', '註冊', '報名', '教材',
            '現金', '匯款', '業績', '業績2', '業績4', '業績6', '業績8',
            '其它通路', '展場活動', '基本通路', '電話接聽', '網際網路',
            '其他(支出)', '其他(繳回)', '活動加回業績', '解約', '解約回繳', '解約扣回活動業績',
            '刷卡(一卡通Line Pay)', '刷卡(綠界)',
            '信用分期(仲信資融)', '信用分期(裕富數位)', '信用分期(綠界(分期))',
            '信用分期(遠東銀行)', '信用分期(遠信資融)'
        ];

        const PERCENTAGE_COLUMNS = [
            '面談率', '註冊率', '成功率', '達成率'
        ];

        // Check if a header looks like it should be currency (for dynamic columns)
        function isCurrencyCol(header) {
            if (CURRENCY_COLUMNS.some(c => header.includes(c))) return true;
            // Academy name columns in sheets 1(通路名單來源分析), 6(繳費項目), 7(收支), 8(課程銷售) are also currency
            if (ALL_ACADEMIES.includes(header)) return true;
            return false;
        }

        // Utility: Format with thousand separators
        function fmtComma(n) {
            return String(Math.round(Number(n) || 0)).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        // Utility: Format percentage
        function fmtPct(n) {
            const num = Number(n) || 0;
            const pct = num > 1 ? num : num * 100;
            return pct.toFixed(1) + '%';
        }

        // Utility: Check if value is numeric
        function isNumeric(val) {
            if (val === '' || val === null || val === undefined) return false;
            return !isNaN(Number(val));
        }

        // Utility: Show status message
        function showStatus(message, type = 'info') {
            const el = document.getElementById('statusMessage');
            const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ';
            el.innerHTML = `<div class="status-message status-${type}">${icon} ${message}</div>`;
            setTimeout(() => { el.innerHTML = ''; }, 4000);
        }

        // ==========================================
        // Data Management
        // ==========================================
        let currentMonth = new Date().getMonth() + 1;
        let currentSheet = 1;
        let currentAnalysisView = 0;
        let selectedAcademy = '';
        let data = {};

        function loadData() {
            const stored = localStorage.getItem('mp_data_v1');
            data = stored ? JSON.parse(stored) : {};
        }

        function saveData() {
            localStorage.setItem('mp_data_v1', JSON.stringify(data));
        }

        function getMonthData(month) {
            return data[month] || {};
        }

        function setMonthData(month, sheetId, rows) {
            if (!data[month]) data[month] = {};
            data[month][`sheet${sheetId}`] = rows;
            saveData();
        }

        // ==========================================
        // UI Initialization
        // ==========================================
        function initMonthNav() {
            const nav = document.getElementById('monthNav');
            nav.innerHTML = '';
            for (let m = 1; m <= 12; m++) {
                const btn = document.createElement('button');
                btn.className = `month-btn ${m === currentMonth ? 'active' : ''}`;
                const hasData = data[m] && Object.keys(data[m]).length > 0;
                btn.innerHTML = `${m}月${hasData ? ' <span style="color:#00ff88;font-size:8px;vertical-align:super;">●</span>' : ''}`;
                btn.onclick = () => selectMonth(m);
                nav.appendChild(btn);
            }
        }

        function initDataTabs() {
            const tabs = document.getElementById('dataTabs');
            tabs.innerHTML = '';
            SHEET_NAMES.forEach(sheet => {
                const btn = document.createElement('button');
                btn.className = `data-tab ${sheet.id === currentSheet ? 'active' : ''}`;
                const label = sheet.emoji ? `${sheet.emoji} ${sheet.name}` : `📋 ${sheet.name}`;
                // Show dot if data exists for this sheet in current month
                const hasData = getMonthData(currentMonth)[`sheet${sheet.id}`]?.length > 0;
                btn.innerHTML = label + (hasData ? ' <span style="color:#00ff88;font-size:8px;">●</span>' : '');
                btn.onclick = () => selectSheet(sheet.id);
                tabs.appendChild(btn);
            });
        }

        function initAnalysisTabs() {
            const tabs = document.getElementById('analysisTabs');
            // Build academy selector
            const acadOpts = ALL_ACADEMIES.map(a => `<option value="${a}" ${selectedAcademy===a?'selected':''}>${a}</option>`).join('');
            tabs.innerHTML = `
                <button class="analysis-tab active" onclick="selectAnalysisView(0)">📊 數據總覽</button>
                <button class="analysis-tab" onclick="selectAnalysisView(1)">🏆 排行分析</button>
                <button class="analysis-tab" onclick="selectAnalysisView(2)">📈 趨勢洞察</button>
                <button class="analysis-tab" onclick="selectAnalysisView(3)">💡 AI 解說</button>
                <button class="analysis-tab" onclick="selectAnalysisView(4)">🎯 戰略顧問</button>
                <select id="academyFilter" onchange="setAcademyFilter(this.value)" style="margin-left:auto;padding:8px 12px;border:1px solid rgba(100,180,255,0.25);background:rgba(15,20,60,0.85);color:#ffd700;border-radius:6px;font-size:12px;cursor:pointer;">
                    <option value="">🏫 全部學院</option>
                    ${acadOpts}
                </select>
            `;
            currentAnalysisView = 0;
        }

        function setAcademyFilter(val) {
            selectedAcademy = val;
            renderContent();
        }

        function selectMonth(month) {
            currentMonth = month;
            currentAnalysisView = 0;
            initMonthNav();
            initDataTabs();
            initAnalysisTabs();
            renderContent();
        }

        function selectSheet(sheetId) {
            currentSheet = sheetId;
            currentAnalysisView = 0;
            sortCol = '';
            sortAsc = true;
            initDataTabs();
            initAnalysisTabs();
            renderContent();
        }

        function selectAnalysisView(view) {
            currentAnalysisView = view;
            const tabs = document.querySelectorAll('.analysis-tab');
            tabs.forEach((tab, idx) => {
                tab.classList.toggle('active', idx === view);
            });
            renderContent();
        }

        // ==========================================
        // Content Rendering
        // ==========================================
        function renderContent() {
            const monthData = getMonthData(currentMonth);
            const sheetKey = `sheet${currentSheet}`;
            const rows = monthData[sheetKey] || [];

            const card = document.getElementById('contentCard');

            if (rows.length === 0) {
                card.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <div class="empty-state-text">該月份尚無數據，請先匯入 Excel 文件</div>
                    </div>
                `;
                return;
            }

            let html = '';

            switch (currentAnalysisView) {
                case 0:
                    html = renderDataOverview(rows);
                    break;
                case 1:
                    html = renderRankingAnalysis(rows);
                    break;
                case 2:
                    html = renderTrendInsight(rows);
                    break;
                case 3:
                    html = renderAICommentary(rows);
                    break;
                case 4:
                    html = renderStrategicAdvisor(rows);
                    break;
            }

            card.innerHTML = html;
        }

        function renderDataOverview(rows) {
            if (rows.length === 0) return '<div class="empty-state"><div>無數據</div></div>';

            const headers = Object.keys(rows[0] || {});
            let html = '<div class="table-wrapper"><table><thead><tr>';

            headers.forEach(header => {
                const arrow = sortCol === header ? (sortAsc ? '▲' : '▼') : '';
                html += `<th onclick="sortTable('${header}')">
                    ${header}
                    <span class="sort-indicator">${arrow}</span>
                </th>`;
            });

            html += '</tr></thead><tbody>';

            rows.forEach((row, idx) => {
                const firstVal = String(row[headers[0]] || '');
                const isTotalRow = firstVal === '合計' || firstVal === '總計';
                html += `<tr${isTotalRow ? ' style="background:rgba(255,215,0,0.08);font-weight:700;"' : ''}>`;
                headers.forEach(header => {
                    const val = row[header];
                    let formatted = val === '' || val === undefined || val === null ? '' : val;

                    if (isNumeric(val) && val !== '') {
                        if (PERCENTAGE_COLUMNS.some(col => header.includes(col))) {
                            formatted = fmtPct(val);
                        } else if (isCurrencyCol(header)) {
                            formatted = fmtComma(val);
                        } else if (Math.abs(Number(val)) >= 1000) {
                            formatted = fmtComma(val);
                        }
                    }

                    html += `<td>${formatted}</td>`;
                });
                html += '</tr>';
            });

            html += '</tbody></table></div>';
            return html;
        }

        function renderRankingAnalysis(rows) {
            if (rows.length === 0) return '<div class="empty-state"><div>無數據</div></div>';

            const headers = Object.keys(rows[0] || {});
            // Pick best ranking column based on sheet type
            const rankPriority = ['總業績', '合計業績', '總計', '業績Ⓐ', '業績'];
            let rankKey = null;
            for (const p of rankPriority) {
                rankKey = headers.find(h => h === p);
                if (rankKey) break;
            }
            if (!rankKey) rankKey = headers.find(h => h.includes('業績') || h.includes('總計')) || headers[headers.length - 1];

            const sorted = [...rows].sort((a, b) => {
                const aVal = Number(a[rankKey]) || 0;
                const bVal = Number(b[rankKey]) || 0;
                return bVal - aVal;
            });

            let html = '<div class="table-wrapper"><table><thead><tr>';
            html += '<th style="width: 50px;">排名</th>';

            headers.forEach(header => {
                html += `<th>${header}</th>`;
            });

            html += '</tr></thead><tbody>';

            sorted.forEach((row, idx) => {
                const rank = idx + 1;
                const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
                let rowStyle = '';
                if (rank === 1) rowStyle = 'background:rgba(255,215,0,0.1);';
                else if (rank === 2) rowStyle = 'background:rgba(200,200,200,0.06);';
                else if (rank === 3) rowStyle = 'background:rgba(205,127,50,0.06);';

                html += `<tr style="${rowStyle}"><td style="font-weight:700;text-align:center;font-size:1.1em;">${medal}</td>`;

                headers.forEach(header => {
                    const val = row[header];
                    let formatted = val === '' || val === undefined || val === null ? '' : val;

                    if (isNumeric(val) && val !== '') {
                        if (PERCENTAGE_COLUMNS.some(col => header.includes(col))) {
                            formatted = fmtPct(val);
                        } else if (isCurrencyCol(header)) {
                            formatted = fmtComma(val);
                        } else if (Math.abs(Number(val)) >= 1000) {
                            formatted = fmtComma(val);
                        }
                    }

                    html += `<td>${formatted}</td>`;
                });
                html += '</tr>';
            });

            html += '</tbody></table></div>';
            return html;
        }

        function renderTrendInsight(rows) {
            if (rows.length === 0) return '<div class="empty-state"><div>無數據</div></div>';

            const headers = Object.keys(rows[0] || {});
            // Pick best column for bar chart
            const valuePriority = ['總業績','合計業績','總計','業績Ⓐ','業績'];
            let valueCol = null;
            for (const p of valuePriority) { valueCol = headers.find(h => h === p); if (valueCol) break; }
            if (!valueCol) valueCol = headers.find(h => h.includes('總計') || h.includes('業績'));

            const nameCol = headers.find(h => h.includes('姓名') || h.includes('學院') || h.includes('組別') || h === '通路來源' || h === '繳費課程' || h === '收支方式') || headers[0];

            let html = '';

            if (valueCol) {
                // Filter out total rows and get valid entries
                const entries = rows.filter(r => {
                    const first = String(r[headers[0]] || '');
                    return first !== '合計' && first !== '總計';
                }).map(r => ({
                    name: String(r[nameCol] || '').substring(0, 12),
                    val: Number(r[valueCol]) || 0
                })).filter(e => e.val > 0).sort((a,b) => b.val - a.val).slice(0, 20);

                if (entries.length > 0) {
                    const maxVal = Math.max(...entries.map(e => e.val));

                    html += `<div class="analysis-item"><div class="analysis-label">📊 ${valueCol} 視覺化排行（前 ${entries.length} 名）</div><div style="margin-top:12px;">`;
                    entries.forEach((e, i) => {
                        const pct = (e.val / maxVal * 100).toFixed(1);
                        const barColor = i < 3 ? 'linear-gradient(90deg, #ffd700, #ffed4e)' : 'linear-gradient(90deg, rgba(100,180,255,0.6), rgba(100,180,255,0.3))';
                        html += `<div style="display:flex;align-items:center;margin-bottom:6px;gap:8px;">
                            <div style="width:100px;text-align:right;font-size:12px;color:${i<3?'#ffd700':'#8ab4ff'};flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${e.name}">${e.name}</div>
                            <div style="flex:1;height:22px;background:rgba(30,40,80,0.5);border-radius:4px;overflow:hidden;">
                                <div style="height:100%;width:${pct}%;background:${barColor};border-radius:4px;transition:width 0.5s;"></div>
                            </div>
                            <div style="width:80px;font-size:12px;color:#d0d0d0;text-align:right;flex-shrink:0;">${fmtComma(e.val)}</div>
                        </div>`;
                    });
                    html += '</div></div>';

                    // Stats
                    const values = entries.map(e => e.val);
                    const sum = values.reduce((a,b) => a+b, 0);
                    const avg = sum / values.length;
                    const median = values[Math.floor(values.length / 2)];
                    html += `<div class="analysis-item"><div class="analysis-label">📈 統計指標</div><div class="analysis-value">
                        最高：${fmtComma(values[0])} | 最低：${fmtComma(values[values.length-1])} | 平均：${fmtComma(Math.round(avg))} | 中位數：${fmtComma(median)}
                    </div></div>`;
                }
            } else {
                html += `<div class="analysis-item"><div class="analysis-label">📊 數據概況</div><div class="analysis-value">
                    總行數: ${rows.length}，欄位數: ${headers.length}
                </div></div>`;
            }

            // Cross-month comparison if data exists
            const otherMonths = Object.keys(data).filter(m => Number(m) !== currentMonth && data[m][`sheet${currentSheet}`]?.length > 0);
            if (otherMonths.length > 0 && valueCol) {
                html += `<div class="analysis-item"><div class="analysis-label">🔄 跨月比較</div><div class="analysis-value">`;
                const curTotal = rows.reduce((s,r) => s + (Number(r[valueCol])||0), 0);
                otherMonths.forEach(m => {
                    const oRows = data[m][`sheet${currentSheet}`] || [];
                    const oTotal = oRows.reduce((s,r) => s + (Number(r[valueCol])||0), 0);
                    const diff = curTotal - oTotal;
                    const diffPct = oTotal > 0 ? ((diff / oTotal) * 100).toFixed(1) : '—';
                    const sign = diff >= 0 ? '+' : '';
                    html += `${m}月 ${valueCol} 合計：${fmtComma(oTotal)} → 本月：${fmtComma(curTotal)}（${sign}${fmtComma(diff)}，${sign}${diffPct}%）<br>`;
                });
                html += '</div></div>';
            }

            return html;
        }

        function renderAICommentary(rows) {
            if (rows.length === 0) return '<div class="empty-state"><div>無數據</div></div>';

            const headers = Object.keys(rows[0] || {});
            const insights = generateAIInsights(rows, headers);

            let html = '<div class="analysis-text">';
            insights.forEach(insight => {
                const borderColor = insight.level === 'danger' ? '#ff4466' : insight.level === 'warn' ? '#ffa726' : insight.level === 'good' ? '#00ff88' : '#ffd700';
                html += `<div class="analysis-item" style="border-left-color:${borderColor};">
                    <div class="analysis-label">${insight.title}</div>
                    <div class="analysis-value" style="white-space:pre-line;line-height:1.9;">${insight.text}</div>
                </div>`;
            });
            html += '</div>';

            return html;
        }

        function generateAIInsights(rows, headers) {
            const insights = [];
            const sheetInfo = SHEET_NAMES.find(s => s.id === currentSheet);
            if (!sheetInfo) return insights;

            // ===== 分析工具函數 =====
            function getVals(col, excludeTotal) {
                return rows.filter(r => {
                    if (excludeTotal) { const f = String(r[headers[0]] || ''); if (f === '合計' || f === '總計') return false; }
                    return isNumeric(r[col]) && Number(r[col]) !== 0;
                }).map(r => ({ name: r[headers.find(h => h.includes('姓名') || h.includes('學院') || h.includes('組別') || h === '通路來源' || h === '繳費課程' || h === '繳費項目' || h === '收支方式')] || r[headers[0]] || '?', val: Number(r[col]) }));
            }
            function topN(arr, n) { return [...arr].sort((a,b) => b.val - a.val).slice(0, n); }
            function botN(arr, n) { return [...arr].sort((a,b) => a.val - b.val).slice(0, n); }
            function sumVals(arr) { return arr.reduce((s,x) => s + x.val, 0); }
            function avgVals(arr) { return arr.length ? sumVals(arr) / arr.length : 0; }
            function stdDev(arr) { const a = avgVals(arr); return Math.sqrt(arr.reduce((s,x) => s + (x.val-a)*(x.val-a), 0) / (arr.length||1)); }
            // Gini coefficient (inequality measure 0=equal, 1=extreme)
            function gini(arr) {
                if (arr.length < 2) return 0;
                const sorted = [...arr].map(x=>x.val).sort((a,b)=>a-b);
                const n = sorted.length;
                const mean = sorted.reduce((a,b)=>a+b,0)/n;
                if (mean === 0) return 0;
                let sum = 0;
                sorted.forEach((v,i) => { sum += (2*(i+1) - n - 1) * v; });
                return sum / (n * n * mean);
            }
            function pct80_20(arr) {
                const sorted = [...arr].sort((a,b) => b.val - a.val);
                const total = sumVals(sorted);
                if (total === 0) return { top20pct: 0, count: 0 };
                const n20 = Math.max(1, Math.ceil(sorted.length * 0.2));
                const top20sum = sumVals(sorted.slice(0, n20));
                return { top20pct: (top20sum/total*100).toFixed(1), count: n20, sum: top20sum };
            }

            const acadFilter = typeof selectedAcademy !== 'undefined' ? selectedAcademy : '';
            function filterByAcad(rowList) {
                if (!acadFilter) return rowList;
                return rowList.filter(r => Object.values(r).some(v => String(v).includes(acadFilter)));
            }
            const af = acadFilter; // shorthand

            switch (sheetInfo.id) {

            case 1: { // ❶ 通路名單來源分析
                const tc = headers.find(h => h === '總計');
                const acadCols = headers.filter(h => ALL_ACADEMIES.includes(h));
                const totRow = rows.find(r => String(r[headers[0]]) === '總計');
                const dataRows = rows.filter(r => { const f=String(r[headers[0]]||''); return f!=='合計'&&f!=='總計'; });

                if (af && headers.includes(af)) {
                    const vals = dataRows.filter(r => Number(r[af])>0).map(r => ({name:r[headers[0]], val:Number(r[af])}));
                    const top5 = topN(vals, 5);
                    const total = sumVals(vals);
                    const p = pct80_20(vals);
                    insights.push({ title: `🔍 ${af} 名單來源診斷`, level: 'info',
                        text: `總名單：${fmtComma(total)} 筆，來自 ${vals.length} 種通路。\n前 ${p.count} 個通路（20%）貢獻了 ${p.top20pct}% 的名單。\n\n【頂級來源】\n${top5.map((x,i) => `${i+1}. ${x.name}：${fmtComma(x.val)} 筆（${(x.val/total*100).toFixed(1)}%）`).join('\n')}` });
                    const singleSource = vals.filter(x => x.val/total > 0.3);
                    if (singleSource.length) {
                        insights.push({ title: '⚠️ 風險：通路過度集中', level: 'danger',
                            text: `${singleSource.map(x=>`「${x.name}」佔 ${(x.val/total*100).toFixed(1)}%`).join('、')}。\n\n→ 芒格原則：永遠不要讓單一來源超過 30%。一旦該通路政策調整、成本上漲或效果衰退，你的名單就會斷崖式下跌。\n→ 立即行動：這個月就測試 2-3 個新的次要通路，即使只分配 10% 預算，也能建立備援。` });
                    }
                    const zeroAcads = acadCols.filter(a => a !== af && totRow && (Number(totRow[a])||0) === 0);
                    if (zeroAcads.length) {
                        insights.push({ title: '📌 盲區：零名單通路', level: 'warn',
                            text: `以下通路在其他學院有名單，但 ${af} 完全沒有：\n不代表不適用，代表還沒嘗試。洛克斐勒的做法：先用最小成本試錯，找到正 ROI 再加碼。` });
                    }
                } else if (tc) {
                    const vals = dataRows.filter(r => Number(r[tc])>0).map(r=>({name:r[headers[0]], val:Number(r[tc])}));
                    const total = sumVals(vals);
                    const p = pct80_20(vals);
                    const g = gini(vals);
                    insights.push({ title: '🧠 通路結構總診斷', level: 'info',
                        text: `全公司 ${fmtComma(total)} 筆名單，來自 ${vals.length} 種通路。\n\n【80/20 法則】前 ${p.count} 個通路（${(p.count/vals.length*100).toFixed(0)}%）貢獻了 ${p.top20pct}% 的名單。\n【集中度】吉尼係數 ${g.toFixed(2)}${g>0.6?'（高度不均 — 少數通路撐起大局，風險高）':g>0.4?'（中度集中 — 可接受但需監控）':'（分散健康）'}。\n\n→ 巴菲特思維：護城河不是靠單一通路建立的。你需要讓至少 5 個通路各貢獻 10% 以上，才算安全。` });
                    const top5 = topN(vals, 5);
                    insights.push({ title: '🏆 TOP 5 通路（你的核心資產）', level: 'good',
                        text: top5.map((x,i) => `${i+1}. ${x.name}：${fmtComma(x.val)}（${(x.val/total*100).toFixed(1)}%）`).join('\n') + `\n\n→ 這些通路是你的「搖錢樹」。問自己：這些通路的成本趨勢是上升還是下降？轉化率是否在衰退？如果明天任何一個消失，你有替代方案嗎？` });
                    if (acadCols.length && totRow) {
                        const acadTotals = acadCols.map(a=>({name:a, val:Number(totRow[a])||0})).sort((a,b)=>b.val-a.val);
                        const acadAvg = avgVals(acadTotals);
                        const below = acadTotals.filter(x => x.val < acadAvg * 0.5);
                        insights.push({ title: '🏫 學院名單分配不均警告', level: below.length > 2 ? 'warn' : 'info',
                            text: `各學院平均 ${fmtComma(Math.round(acadAvg))} 筆。\n名單最多：${acadTotals[0].name}（${fmtComma(acadTotals[0].val)}）\n名單最少：${acadTotals[acadTotals.length-1].name}（${fmtComma(acadTotals[acadTotals.length-1].val)}）\n差距：${(acadTotals[0].val/Math.max(acadTotals[acadTotals.length-1].val,1)).toFixed(1)} 倍\n${below.length?`\n⚠️ ${below.length} 個學院低於平均 50%：${below.map(x=>x.name).join('、')}\n→ 馬斯克第一原理：名單不足的學院，先檢查是投放不足還是轉化不行。不要平均分配預算，要分配給 ROI 最高的地方。`:'\n✅ 分配尚可，持續監控。'}` });
                    }
                }
                break;
            }

            case 2: { // ❷ 通路業績
                const tc = headers.find(h => h === '總計');
                const channels = headers.filter(h => h !== headers[0] && h !== '總計');
                const dataRows = rows.filter(r => {const f=String(r[headers[0]]); return f!=='合計'&&f!=='總計';});

                if (af) {
                    const row = rows.find(r => String(r[headers[0]]).includes(af));
                    if (row) {
                        const total = Number(row['總計'])||0;
                        const chVals = channels.map(ch=>({name:ch, val:Number(row[ch])||0})).filter(x=>x.val>0).sort((a,b)=>b.val-a.val);
                        const topCh = chVals[0];
                        const dep = topCh ? (topCh.val/total*100).toFixed(1) : 0;
                        // Find academy rank
                        const allAcadVals = dataRows.map(r=>({name:r[headers[0]], val:Number(r['總計'])||0})).sort((a,b)=>b.val-a.val);
                        const rank = allAcadVals.findIndex(x=>String(x.name).includes(af)) + 1;

                        insights.push({ title: `🔍 ${af} 通路業績診斷`, level: 'info',
                            text: `總業績：${fmtComma(total)}（全公司排名第 ${rank}/${allAcadVals.length}）\n\n【通路結構】\n${chVals.map(x=>`${x.name}：${fmtComma(x.val)}（${(x.val/total*100).toFixed(1)}%）`).join('\n')}` });
                        if (Number(dep) > 50) {
                            insights.push({ title: '🚨 嚴重依賴單一通路', level: 'danger',
                                text: `「${topCh.name}」佔比 ${dep}%，超過一半業績來自單一通路。\n\n→ 這是結構性風險。洛克斐勒說過：「不要把所有雞蛋放在一個籃子裡，但要確保每個籃子都有人看管。」\n→ 本月目標：讓第二大通路從 ${chVals[1]?fmtComma(chVals[1].val):'0'} 成長至少 15%。方法：從現有客戶名單中挖掘交叉銷售機會。` });
                        }
                        const weakCh = channels.filter(ch => (Number(row[ch])||0) === 0);
                        if (weakCh.length) {
                            insights.push({ title: '📌 未開發通路', level: 'warn',
                                text: `${af} 在以下通路業績為零：${weakCh.join('、')}\n\n→ 零不代表不行，代表還沒做。找到同區域做得好的學院，直接複製他們的方法。別重新發明輪子。` });
                        }
                    }
                } else if (tc) {
                    const vals = dataRows.map(r=>({name:r[headers[0]], val:Number(r['總計'])||0}));
                    const total = sumVals(vals);
                    const g = gini(vals);
                    const chTotals = channels.map(ch => {
                        const sum = dataRows.reduce((s,r)=>s+(Number(r[ch])||0), 0);
                        return {name:ch, val:sum};
                    }).sort((a,b)=>b.val-a.val);
                    const baseCh = chTotals.find(x => x.name === '基本通路');
                    const baseRatio = baseCh ? (baseCh.val/total*100).toFixed(1) : 0;

                    insights.push({ title: '🧠 通路業績戰略分析', level: 'info',
                        text: `全公司通路業績：${fmtComma(total)}\n學院間吉尼係數：${g.toFixed(2)}${g>0.5?' — 學院差距大，資源可能分配不均':' — 差距合理'}\n\n【通路佔比】\n${chTotals.map(x=>`${x.name}：${fmtComma(x.val)}（${(x.val/total*100).toFixed(1)}%）`).join('\n')}` });
                    if (Number(baseRatio) > 50) {
                        insights.push({ title: '⚠️ 基本通路依賴過高', level: 'warn',
                            text: `基本通路佔比 ${baseRatio}%。這代表超過一半業績來自既有客戶（加購、續約）。\n\n→ 短期好看，長期危險。既有客戶池是有限的，遲早會被榨乾。\n→ 柯維「第七個習慣」：不斷更新。每月至少 30% 業績要來自新客戶通路（網路、展場），否則明年會很痛苦。\n→ 立即行動：統計每個學院新客占比，低於 25% 的需要專項改善。` });
                    }
                    const top3 = topN(vals, 3);
                    const bot3 = botN(vals, 3);
                    insights.push({ title: '🏆 標竿 vs 落後', level: 'good',
                        text: `【TOP 3 標竿】\n${top3.map((x,i)=>`${i+1}. ${x.name}：${fmtComma(x.val)}`).join('\n')}\n\n【BOTTOM 3 需要救援】\n${bot3.map((x,i)=>`${i+1}. ${x.name}：${fmtComma(x.val)}`).join('\n')}\n\n→ 差距 ${(top3[0].val/Math.max(bot3[0].val,1)).toFixed(1)} 倍。落後學院不是能力問題，通常是方法問題。讓 TOP 學院的組長去做一次分享，比任何培訓都有用。` });
                }
                break;
            }

            case 3: { // ❸ 業務個人績效
                const revCol = headers.find(h => h === '合計業績');
                const nameCol2 = headers.find(h => h === '姓名');
                const dataRows = af ? filterByAcad(rows) : rows;
                if (!revCol || !nameCol2) break;

                const allPeople = dataRows.filter(r=>isNumeric(r[revCol])).map(r=>({
                    name:r[nameCol2]||'?', val:Number(r[revCol]), acad:r['學院']||'',
                    rate:Number(r['達成率'])||0, interview:Number(r['面談'])||0,
                    iRate:Number(r['面談率'])||0, regA:Number(r['註冊Ⓐ'])||0,
                    revA:Number(r['業績Ⓐ'])||0, refund:Number(r['退費金額'])||0
                }));
                const active = allPeople.filter(x=>x.val>0);
                const total = sumVals(active);
                const avg = avgVals(active);
                const sd = stdDev(active);
                const p = pct80_20(active);
                const over = active.filter(x=>x.rate>=1);
                const under50 = active.filter(x=>x.rate>0&&x.rate<0.5);
                const zeroInterview = allPeople.filter(x=>x.interview===0);

                insights.push({ title: `🧠 業務戰力總診斷${af?' — '+af:''}`, level: 'info',
                    text: `有效業務：${active.length} 人（總人數 ${allPeople.length}）\n總業績：${fmtComma(total)}\n人均業績：${fmtComma(Math.round(avg))}\n標準差：${fmtComma(Math.round(sd))}（${sd/avg>0.8?'⚠️ 極度不均 — 少數人扛大樑':sd/avg>0.5?'偏高 — 有改善空間':'健康'}）\n\n【80/20 法則】前 ${p.count} 人（${(p.count/active.length*100).toFixed(0)}%）創造了 ${p.top20pct}% 的業績。\n達標人數：${over.length}/${active.length}（${(over.length/active.length*100).toFixed(0)}%）` });

                const top5 = topN(active, 5);
                insights.push({ title: '🏆 TOP 5 戰將（研究他們的方法）', level: 'good',
                    text: top5.map((x,i)=>`${i+1}. ${x.name}（${x.acad}）\n   業績 ${fmtComma(x.val)} ｜ 達成率 ${(x.rate*100).toFixed(0)}% ｜ 面談 ${x.interview} ｜ 面談率 ${(x.iRate*100).toFixed(0)}%`).join('\n') +
                    `\n\n→ 芒格的「反轉思維」：不問「怎麼變好」，問「TOP 5 做了什麼是別人沒做的？」找到那個差異化行為，然後標準化複製。` });

                if (under50.length > 0) {

        let sortCol = '';
        let sortAsc = true;

        function sortTable(columnName) {
            if (sortCol === columnName) {
                sortAsc = !sortAsc;
            } else {
                sortCol = columnName;
                sortAsc = true;
            }

            const monthData = getMonthData(currentMonth);
            const sheetKey = `sheet${currentSheet}`;
            let rows = monthData[sheetKey] || [];
            const headers = Object.keys(rows[0] || {});

            // Separate total rows (pin at bottom)
            const totalRows = rows.filter(r => { const f = String(r[headers[0]]||''); return f === '合計' || f === '總計'; });
            let dataRows = rows.filter(r => { const f = String(r[headers[0]]||''); return f !== '合計' && f !== '總計'; });

            const isNum = dataRows.some(r => isNumeric(r[columnName]));

            dataRows.sort((a, b) => {
                const aVal = a[columnName];
                const bVal = b[columnName];
                let cmp;
                if (isNum) {
                    cmp = (Number(aVal) || 0) - (Number(bVal) || 0);
                } else {
                    cmp = String(aVal||'').localeCompare(String(bVal||''), 'zh-TW');
                }
                return sortAsc ? cmp : -cmp;
            });

            setMonthData(currentMonth, currentSheet, [...dataRows, ...totalRows]);
            renderContent();
        }

        // ==========================================
        // Excel Import
        // ==========================================
        function handleFileImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const rawData = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(rawData, { type: 'array' });

                    let importedCount = 0;
                    const skipped = [];

                    SHEET_NAMES.forEach(sheet => {
                        // Find matching sheet by matchKeys (partial match)
                        const matchedName = workbook.SheetNames.find(wsName => {
                            return sheet.matchKeys.some(key => wsName.includes(key));
                        });
                        if (!matchedName) { skipped.push(sheet.emoji); return; }
                        const sheetObj = workbook.Sheets[matchedName];
                        if (!sheetObj) { skipped.push(sheet.emoji); return; }

                        let rows = XLSX.utils.sheet_to_json(sheetObj, { defval: '' });
                        if (rows.length === 0) return;

                        // Remove columns with empty/meaningless headers (e.g., '__EMPTY', '')
                        const validHeaders = Object.keys(rows[0]).filter(k => k && !k.startsWith('__EMPTY') && k.trim() !== '');

                        rows = rows.map(row => {
                            const clean = {};
                            validHeaders.forEach(k => {
                                let v = row[k];
                                // Clean NaN, undefined, 'None' etc.
                                if (v === undefined || v === null) { clean[k] = ''; return; }
                                const sv = String(v).trim();
                                if (sv === 'nan' || sv === 'NaN' || sv === 'None' || sv === 'none') { clean[k] = ''; return; }
                                clean[k] = v;
                            });
                            return clean;
                        });

                        // ❺ 學院績效總表: forward-fill 區域 column (merged cells cause empty values)
                        if (sheet.id === 5) {
                            const regionKey = validHeaders.find(h => h.includes('區域'));
                            if (regionKey) {
                                let lastRegion = '';
                                rows.forEach(row => {
                                    const val = String(row[regionKey] || '').trim();
                                    if (val && val !== '合計' && val !== '總計') {
                                        lastRegion = val;
                                    } else if (!val && lastRegion) {
                                        row[regionKey] = lastRegion;
                                    }
                                });
                            }
                        }

                        // Remove fully empty rows
                        rows = rows.filter(row => Object.values(row).some(v => v !== '' && v !== 0));

                        if (rows.length > 0) {
                            setMonthData(currentMonth, sheet.id, rows);
                            importedCount++;
                        }
                    });

                    let msg = `成功匯入 ${importedCount} 個表格至 ${currentMonth} 月`;
                    if (skipped.length) msg += `（未找到：${skipped.join(' ')}）`;
                    showStatus(msg, importedCount > 0 ? 'success' : 'error');
                    initMonthNav();
                    initDataTabs();
                    renderContent();
                } catch (err) {
                    showStatus(`匯入失敗：${err.message}`, 'error');
                    console.error(err);
                }
            };
            reader.readAsArrayBuffer(file);
            event.target.value = '';
        }

        // ==========================================
        // Initialization
        // ==========================================
        function init() {
            loadData();
            initMonthNav();
            initDataTabs();
            initAnalysisTabs();
            renderContent();
        }

        // Adjust layout if in iframe
        if (window !== window.parent) {
            const backBtn = document.querySelector('.back-btn');
            if (backBtn) backBtn.style.display = 'none';
            document.body.style.padding = '10px';
            document.querySelector('.header').style.marginBottom = '15px';
        }

        // Start
        init();
    </script>
<script src="./nav-home.js"></script>
<script src="day-mode-init.js"></script>
</body>
</html>
