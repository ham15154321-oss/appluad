<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瀑布 — A通路作戰中心</title>
<style>
:root{
  --bg:#0a0e1a; --card:rgba(255,255,255,0.05); --border:rgba(255,255,255,0.1);
  --accent:#06b6d4; --accent2:#3b82f6; --gold:#fbbf24; --green:#22c55e;
  --red:#ef4444; --purple:#a78bfa; --dim:#64748b; --text:#e2e8f0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Noto Sans TC','PingFang TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.header{background:linear-gradient(135deg,#0a1628 0%,#0f172a 50%,#071320 100%);padding:24px 24px 18px;text-align:center;border-bottom:1px solid rgba(6,182,212,0.2);position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(6,182,212,0.12) 0%,transparent 70%);}
.header h1{font-size:22px;font-weight:800;color:#fff;position:relative;letter-spacing:1px;}
.header h1 span{color:var(--accent);}
.header p{margin-top:6px;color:#94a3b8;font-size:12px;position:relative;}
.header .who{margin-top:6px;font-size:12px;color:var(--gold);position:relative;}

.month-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:14px;background:rgba(255,255,255,0.03);border-bottom:1px solid var(--border);}
.month-bar button{background:rgba(255,255,255,0.08);border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;}
.month-bar button:hover{background:rgba(6,182,212,0.2);border-color:var(--accent);}
.month-label{font-size:17px;font-weight:700;color:#fff;min-width:140px;text-align:center;}

.container{max-width:1080px;margin:0 auto;padding:18px 14px 90px;}
.section{margin-bottom:26px;}
.section-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.section-title .icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.subhead{font-size:13px;font-weight:700;color:#cbd5e1;margin:14px 0 8px;display:flex;align-items:center;gap:6px;}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;}
.edit-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
.edit-row label{font-size:12px;color:var(--dim);width:64px;flex-shrink:0;}
.tin{flex:1;min-width:120px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:13px;outline:none;font-family:inherit;}
.tin:focus{border-color:var(--accent);}
textarea.tin{min-height:90px;resize:vertical;line-height:1.6;}
select.tin{cursor:pointer;}

.btn{padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.06);color:var(--text);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn:hover{background:rgba(255,255,255,0.13);}
.btn.cyan{border-color:rgba(6,182,212,0.35);color:#22d3ee;}
.btn.cyan:hover{background:rgba(6,182,212,0.15);}
.btn.purple{border-color:rgba(167,139,250,0.35);color:#a78bfa;}
.btn.purple:hover{background:rgba(167,139,250,0.15);}
.btn.danger{border-color:rgba(239,68,68,0.3);color:#f87171;}
.btn.danger:hover{background:rgba(239,68,68,0.15);}
.btn.gold{border-color:rgba(251,191,36,0.35);color:#fbbf24;}
.btn.gold:hover{background:rgba(251,191,36,0.15);}

.link-open{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#22d3ee;text-decoration:none;padding:6px 10px;border:1px solid rgba(6,182,212,0.3);border-radius:6px;white-space:nowrap;}
.link-open:hover{background:rgba(6,182,212,0.12);}
.link-open.off{color:var(--dim);border-color:var(--border);pointer-events:none;opacity:.5;}

/* link list rows (Block 4 / 5) */
.lrow{display:flex;gap:8px;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:8px;flex-wrap:wrap;}
.lrow .tin{font-size:12px;padding:6px 9px;}
.lrow .t-title{flex:2;min-width:130px;}
.lrow .t-tag{flex:1;min-width:80px;max-width:130px;}
.lrow .t-url{flex:3;min-width:160px;}

/* award card */
.award{background:linear-gradient(135deg,rgba(251,191,36,0.08),rgba(245,158,11,0.04));border:1px solid rgba(251,191,36,0.25);border-radius:14px;padding:18px;}
.award-head{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.award-trophy{font-size:34px;}
.award-star-name{font-size:20px;font-weight:800;color:#fbbf24;}
.award-star-sub{font-size:12px;color:#94a3b8;}

/* linked case chips */
.case-chip{display:flex;align-items:center;gap:8px;background:rgba(6,182,212,0.07);border:1px solid rgba(6,182,212,0.25);border-radius:8px;padding:8px 10px;margin-bottom:6px;}
.case-chip .cc-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap;}
.cc-tag.voice{background:rgba(123,224,200,0.16);color:#7be0c8;}
.cc-tag.acceptance{background:rgba(255,176,80,0.16);color:#ffb050;}
.case-chip .cc-title{flex:1;font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.case-chip .cc-link{font-size:9px;color:#7be0c8;border:1px solid rgba(123,224,200,.3);border-radius:8px;padding:1px 6px;}

/* placeholder */
.placeholder{background:rgba(255,255,255,0.03);border:1px dashed rgba(255,255,255,0.15);border-radius:14px;padding:30px;text-align:center;color:var(--dim);font-size:13px;}
.placeholder .pl-icon{font-size:30px;margin-bottom:8px;}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:9999;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-bg.open{display:flex;}
.modal{background:#0f172a;border:1px solid var(--border);border-radius:16px;max-width:560px;width:100%;max-height:86vh;overflow-y:auto;padding:20px;}
.modal h3{font-size:16px;color:#fff;margin-bottom:12px;}
.modal-body{font-size:13px;color:#cbd5e1;line-height:1.8;white-space:pre-wrap;}
.pick-item{border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:8px;}
.pick-item .pi-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.pick-item .pi-title{flex:1;font-size:13px;font-weight:600;color:#fff;}
.pick-item .pi-preview{font-size:11px;color:var(--dim);max-height:34px;overflow:hidden;}

.save-bar{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(180deg,transparent,rgba(10,14,26,0.96) 35%);padding:18px 24px 26px;display:flex;justify-content:center;z-index:100;}
.save-btn{padding:10px 28px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;background:linear-gradient(135deg,#06b6d4,#3b82f6);color:#fff;}
.save-btn:hover{box-shadow:0 0 18px rgba(6,182,212,0.4);}

.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-60px);padding:9px 22px;border-radius:10px;font-size:13px;font-weight:600;z-index:10000;opacity:0;transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:560px){
  .edit-row label{width:100%;}
  .lrow .tin{flex:1 1 100%;max-width:none;}
}
</style>
<script src="./auth-check.js"></script>
<script defer src="./firebase-sync.js"></script>
<link rel="stylesheet" href="day-mode.css">
</head>
<body>

<div class="header">
  <h1>🏔️ <span>瀑 布</span> — A通路作戰中心</h1>
  <p>本月約訪之星 · 需優化錄音 · 作戰計劃 · 話術與獵殺名單</p>
  <div class="who" id="whoLabel"></div>
</div>

<div class="month-bar">
  <button onclick="changeMonth(-1)">◀</button>
  <div class="month-label" id="monthLabel">—</div>
  <button onclick="changeMonth(1)">▶</button>
</div>

<div class="container">

  <!-- ══ Block 1 — 本月約訪之星 ══ -->
  <div class="section">
    <div class="section-title"><div class="icon" style="background:rgba(251,191,36,0.2);">🏆</div>本月約訪之星</div>
    <div class="award" id="block1"></div>
  </div>

  <!-- ══ Block 2 — 需優化錄音（下一階段）══ -->
  <div class="section">
    <div class="section-title"><div class="icon" style="background:rgba(34,197,94,0.2);">🎧</div>需優化錄音 ×3</div>
    <div class="placeholder"><div class="pl-icon">🚧</div>下一階段建置中<br><span style="font-size:11px;">需優化錄音卡 ×3 + 🎙️錄音轉摘要 + A業績長條圖</span></div>
  </div>

  <!-- ══ Block 3 — 本月目標作戰計劃（下一階段）══ -->
  <div class="section">
    <div class="section-title"><div class="icon" style="background:rgba(167,139,250,0.2);">📋</div>本月目標作戰計劃</div>
    <div class="placeholder"><div class="pl-icon">🚧</div>下一階段建置中<br><span style="font-size:11px;">文字記錄 + AI 分析 + 會議記錄 + 連到 A通路研究院</span></div>
  </div>

  <!-- ══ Block 4 — 當月話術與獵殺名單 ══ -->
  <div class="section">
    <div class="section-title"><div class="icon" style="background:rgba(59,130,246,0.2);">📝</div>當月話術與獵殺名單</div>
    <div class="subhead">🗣️ 話術 <button class="btn cyan" onclick="addLink('scripts')">＋ 新增</button></div>
    <div id="scriptsList"></div>
    <div class="subhead">🎯 獵殺名單 <button class="btn cyan" onclick="addLink('hunts')">＋ 新增</button></div>
    <div id="huntsList"></div>
  </div>

  <!-- ══ Block 5 — 話術檔案庫 ══ -->
  <div class="section">
    <div class="section-title"><div class="icon" style="background:rgba(167,139,250,0.2);">📂</div>話術檔案庫
      <button class="btn purple" onclick="addFile()">＋ 新增</button>
      <span style="font-size:11px;color:var(--dim);">（跨月累積、不清空）</span>
    </div>
    <div id="filesList"></div>
  </div>

</div>

<!-- 選錄音案例 modal -->
<div class="modal-bg" id="casePickerModal">
  <div class="modal">
    <h3>🎙️ 連結 AI 顧問錄音案例</h3>
    <div style="font-size:12px;color:var(--dim);margin-bottom:10px;">選一則「錄音學習 / 驗收電話」案例連結進來（與 AI 顧問同一份資料）。</div>
    <div id="casePickerList"></div>
    <div style="text-align:right;margin-top:10px;"><button class="btn" onclick="closeModal('casePickerModal')">關閉</button></div>
  </div>
</div>

<!-- 看案例全文 modal -->
<div class="modal-bg" id="caseViewModal">
  <div class="modal">
    <h3 id="caseViewTitle">案例</h3>
    <div class="modal-body" id="caseViewBody"></div>
    <div style="text-align:right;margin-top:12px;"><button class="btn" onclick="closeModal('caseViewModal')">關閉</button></div>
  </div>
</div>

<div class="toast" id="toast">✓ 已儲存</div>
<div class="save-bar"><button class="save-btn" onclick="saveAll()">💾 儲存</button></div>

<script>
// ════════ 身份 / 儲存（per-主角）════════
function charId(){ return localStorage.getItem('activeCharacterId') || 'default'; }
function charName(){ return localStorage.getItem('activeCharacterName') || localStorage.getItem('activeCharacterId') || ''; }
function SK(){ return 'char_' + charId() + '_waterfall_v3'; }
function FILES_SK(){ return 'char_' + charId() + '_waterfall_files_v3'; }

var allData = {};
var files = [];
var currentYear = new Date().getFullYear();
var currentMonth = new Date().getMonth() + 1;

function monthKey(){ return currentYear + '-' + currentMonth; }
function defaultMonth(){
  return {
    star:{ name:'', reason:'', photoUrl:'', caseIds:[] },
    needImprove:[ {driveUrl:'',name:'',note:'',caseIds:[]}, {driveUrl:'',name:'',note:'',caseIds:[]}, {driveUrl:'',name:'',note:'',caseIds:[]} ],
    battlePlan:{ notes:'', suggestions:[], meetingUrl:'', meetingText:'' },
    scripts:[], hunts:[]
  };
}
function md(){ var k=monthKey(); if(!allData[k]) allData[k]=defaultMonth(); return allData[k]; }

function loadAll(){
  try{ var r=localStorage.getItem(SK()); if(r) allData=JSON.parse(r)||{}; }catch(e){ allData={}; }
  try{ var f=localStorage.getItem(FILES_SK()); if(f) files=JSON.parse(f)||[]; }catch(e){ files=[]; }
}
var _saveTimer=null;
function scheduleSave(){
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(function(){
    try{ localStorage.setItem(SK(), JSON.stringify(allData)); }catch(e){ toast('⚠ 儲存失敗：'+e.message,true); }
  }, 700);
}
function saveAll(){
  try{
    localStorage.setItem(SK(), JSON.stringify(allData));
    localStorage.setItem(FILES_SK(), JSON.stringify(files));
    toast('✅ 已儲存（'+monthKey()+'）');
  }catch(e){ toast('⚠ 儲存失敗：'+e.message,true); }
}
function saveFiles(){
  try{ localStorage.setItem(FILES_SK(), JSON.stringify(files)); }catch(e){ toast('⚠ 儲存失敗：'+e.message,true); }
}
window.triggerSave = saveAll;

// ════════ 小工具 ════════
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg,isErr){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=isErr?'#7f1d1d':'#166534';
  t.style.color=isErr?'#fca5a5':'#4ade80';
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); },2200);
}
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function safeUrl(u){ u=String(u||'').trim(); return /^https?:\/\//i.test(u) ? u : ''; }

// ════════ 月份 ════════
function updateMonthLabel(){ document.getElementById('monthLabel').textContent = currentYear+' 年 '+currentMonth+' 月'; }
function changeMonth(d){
  currentMonth+=d;
  if(currentMonth>12){ currentMonth=1; currentYear++; }
  if(currentMonth<1){ currentMonth=12; currentYear--; }
  updateMonthLabel();
  renderAll();
}

// ════════ 業績數據（mp_data_v1，全主角共享，IndexedDB SpaceBaseDB.images）════════
var _mpData=null, _mpLoaded=false;
function loadMpData(){
  return new Promise(function(resolve){
    try{
      var req=indexedDB.open('SpaceBaseDB');
      req.onsuccess=function(){
        var db=req.result;
        if(!db.objectStoreNames.contains('images')){ _mpLoaded=true; resolve(); return; }
        try{
          var g=db.transaction('images','readonly').objectStore('images').get('mp_data_v1');
          g.onsuccess=function(){
            var v=g.result;
            if(v){ try{ _mpData=(typeof v==='string')?JSON.parse(v):v; }catch(e){ _mpData=null; } }
            _mpLoaded=true; resolve();
          };
          g.onerror=function(){ _mpLoaded=true; resolve(); };
        }catch(e){ _mpLoaded=true; resolve(); }
      };
      req.onerror=function(){ _mpLoaded=true; resolve(); };
    }catch(e){ _mpLoaded=true; resolve(); }
  });
}
// 找登入主角的小組成員（從 sheet4 正式小組業績總表：組長 = 主角 → 收集 組員*）
function getGroupMembers(){
  var me=charName(); var out=[];
  if(me) out.push(me);
  if(!_mpData) return out;
  var months=Object.keys(_mpData).sort(function(a,b){return Number(b)-Number(a);});
  for(var mi=0;mi<months.length;mi++){
    var s4=(_mpData[months[mi]]||{}).sheet4||[];
    for(var ri=0;ri<s4.length;ri++){
      var row=s4[ri]||{};
      if(String(row['組長']||'').trim()===me){
        Object.keys(row).forEach(function(k){
          if(/^組員/.test(k)){ var nm=String(row[k]||'').trim(); if(nm && out.indexOf(nm)<0) out.push(nm); }
        });
        return out;  // 找到主角的組就回傳
      }
    }
  }
  return out;
}

// ════════ 案例資料庫（ai_casedb_v1，與 AI 顧問共用）════════
function loadCases(){
  try{ var r=localStorage.getItem('ai_casedb_v1'); var a=r?JSON.parse(r):[]; return Array.isArray(a)?a:[]; }
  catch(e){ return []; }
}
function voiceCases(){ return loadCases().filter(function(c){ return c.type==='voice'||c.type==='acceptance'; }); }
function caseById(id){ return loadCases().find(function(c){ return c.id===id; }) || null; }
function caseTitle(c){ return String((c&&c.text)||'').split('\n')[0].trim() || '(未命名案例)'; }

// ════════ Block 1 — 本月約訪之星 ════════
function renderBlock1(){
  var d=md().star;
  var members=getGroupMembers();
  // 姓名選單
  var opts='<option value="">— 選擇 —</option>';
  members.forEach(function(m){ opts+='<option value="'+escAttr(m)+'"'+(m===d.name?' selected':'')+'>'+esc(m)+'</option>'; });
  if(d.name && members.indexOf(d.name)<0) opts+='<option value="'+escAttr(d.name)+'" selected>'+esc(d.name)+'（手動）</option>';
  opts+='<option value="__manual__">✏️ 手動輸入…</option>';

  var caseHtml=(d.caseIds||[]).map(function(cid){
    var c=caseById(cid);
    var tg=c?(c.type==='acceptance'?'acceptance':'voice'):'voice';
    var lbl=tg==='acceptance'?'📞 驗收電話':'🎙️ 錄音學習';
    return '<div class="case-chip">'
      +'<span class="cc-tag '+tg+'">'+lbl+'</span>'
      +'<span class="cc-title">'+esc(c?caseTitle(c):'(案例已刪除)')+'</span>'
      +(c?'<span class="cc-link">AI 顧問連動</span><button class="btn" onclick="viewCase(\''+cid+'\')">看</button>':'')
      +'<button class="btn danger" onclick="unlinkCase(\'star\',0,\''+cid+'\')">移除</button>'
      +'</div>';
  }).join('');

  document.getElementById('block1').innerHTML=
    '<div class="award-head">'
    +'<div class="award-trophy">🏆</div>'
    +'<div><div class="award-star-name">'+esc(d.name||'尚未選定')+'</div>'
    +'<div class="award-star-sub">本月約訪表現最佳</div></div></div>'
    +'<div class="edit-row"><label>姓名</label><select class="tin" onchange="setStarName(this.value)">'+opts+'</select></div>'
    +'<div class="edit-row"><label>嘉許原因</label><input class="tin" value="'+escAttr(d.reason)+'" placeholder="例：本月約訪率 85%，面談轉化最高" oninput="md().star.reason=this.value;scheduleSave();"></div>'
    +'<div class="edit-row"><label>照片連結</label><input class="tin" value="'+escAttr(d.photoUrl)+'" placeholder="貼 Google 雲端硬碟連結" oninput="md().star.photoUrl=this.value;scheduleSave();_syncOpen(this);">'
    +'<a class="link-open'+(safeUrl(d.photoUrl)?'':' off')+'" href="'+escAttr(safeUrl(d.photoUrl)||'#')+'" target="_blank">🔗 開啟</a></div>'
    +'<div style="margin-top:10px;"><div class="subhead" style="margin:6px 0;">🎙️ 連結錄音案例 '
    +'<button class="btn cyan" onclick="openCasePicker(\'star\',0)">＋ 連結案例</button></div>'
    +(caseHtml||'<div style="font-size:12px;color:var(--dim);">尚未連結（可連多則）</div>')+'</div>';
}
function setStarName(v){
  if(v==='__manual__'){
    var nm=prompt('輸入姓名：', md().star.name||'');
    if(nm===null){ renderBlock1(); return; }
    md().star.name=nm.trim();
  } else { md().star.name=v; }
  scheduleSave(); renderBlock1();
}
function _syncOpen(inp){
  var a=inp.parentNode.querySelector('.link-open'); if(!a) return;
  var u=safeUrl(inp.value);
  if(u){ a.href=u; a.classList.remove('off'); } else { a.href='#'; a.classList.add('off'); }
}

// ════════ Block 4 — 話術 / 獵殺名單 ════════
function renderLinkList(kind){
  var arr=md()[kind]||[];
  var el=document.getElementById(kind+'List');
  if(!arr.length){ el.innerHTML='<div style="font-size:12px;color:var(--dim);padding:6px 0;">尚無項目，點上方「＋ 新增」</div>'; return; }
  el.innerHTML=arr.map(function(it,i){
    return '<div class="lrow">'
      +'<input class="tin t-title" value="'+escAttr(it.title)+'" placeholder="標題" oninput="md().'+kind+'['+i+'].title=this.value;scheduleSave();">'
      +'<input class="tin t-tag" value="'+escAttr(it.tag)+'" placeholder="標籤(通路/班務…)" oninput="md().'+kind+'['+i+'].tag=this.value;scheduleSave();">'
      +'<input class="tin t-url" value="'+escAttr(it.url)+'" placeholder="Google 雲端硬碟連結" oninput="md().'+kind+'['+i+'].url=this.value;scheduleSave();_syncOpen(this);">'
      +'<a class="link-open'+(safeUrl(it.url)?'':' off')+'" href="'+escAttr(safeUrl(it.url)||'#')+'" target="_blank">🔗 開啟</a>'
      +'<button class="btn danger" onclick="delLink(\''+kind+'\','+i+')">🗑</button>'
      +'</div>';
  }).join('');
}
function addLink(kind){ md()[kind].push({title:'',tag:'',url:''}); scheduleSave(); renderLinkList(kind); }
function delLink(kind,i){ md()[kind].splice(i,1); scheduleSave(); renderLinkList(kind); }

// ════════ Block 5 — 話術檔案庫（跨月）════════
function renderFiles(){
  var el=document.getElementById('filesList');
  if(!files.length){ el.innerHTML='<div style="font-size:12px;color:var(--dim);padding:6px 0;">尚無檔案，點上方「＋ 新增」</div>'; return; }
  el.innerHTML=files.map(function(it,i){
    return '<div class="lrow">'
      +'<input class="tin t-title" value="'+escAttr(it.name)+'" placeholder="檔案名稱" oninput="files['+i+'].name=this.value;saveFiles();">'
      +'<input class="tin t-url" value="'+escAttr(it.url)+'" placeholder="Google 雲端硬碟連結" oninput="files['+i+'].url=this.value;saveFiles();_syncOpen(this);">'
      +'<a class="link-open'+(safeUrl(it.url)?'':' off')+'" href="'+escAttr(safeUrl(it.url)||'#')+'" target="_blank">🔗 開啟</a>'
      +'<button class="btn danger" onclick="delFile('+i+')">🗑</button>'
      +'</div>';
  }).join('');
}
function addFile(){ files.push({name:'',url:''}); saveFiles(); renderFiles(); }
function delFile(i){ files.splice(i,1); saveFiles(); renderFiles(); }

// ════════ 錄音案例 picker / viewer ════════
var _pickTarget=null; // {kind:'star'|'need', idx}
function openCasePicker(kind,idx){
  _pickTarget={kind:kind,idx:idx};
  var cases=voiceCases();
  var el=document.getElementById('casePickerList');
  if(!cases.length){ el.innerHTML='<div style="font-size:12px;color:var(--dim);padding:14px;text-align:center;">AI 顧問還沒有錄音學習／驗收電話案例。</div>'; }
  else{
    el.innerHTML=cases.slice().reverse().map(function(c){
      var tg=c.type==='acceptance'?'acceptance':'voice';
      var lbl=tg==='acceptance'?'📞 驗收電話':'🎙️ 錄音學習';
      var preview=String(c.text||'').replace(/\n+/g,' ').substring(0,60);
      return '<div class="pick-item">'
        +'<div class="pi-top"><span class="cc-tag '+tg+'">'+lbl+'</span>'
        +'<span class="pi-title">'+esc(caseTitle(c))+'</span></div>'
        +'<div class="pi-preview">'+esc(preview)+'…</div>'
        +'<div style="margin-top:6px;display:flex;gap:6px;">'
        +'<button class="btn" onclick="viewCase(\''+c.id+'\')">看全文</button>'
        +'<button class="btn cyan" onclick="pickCase(\''+c.id+'\')">＋ 連結這則</button></div>'
        +'</div>';
    }).join('');
  }
  document.getElementById('casePickerModal').classList.add('open');
}
function pickCase(cid){
  if(!_pickTarget) return;
  var t=_pickTarget.kind==='star' ? md().star : md().needImprove[_pickTarget.idx];
  if(!t.caseIds) t.caseIds=[];
  if(t.caseIds.indexOf(cid)<0) t.caseIds.push(cid);
  scheduleSave();
  closeModal('casePickerModal');
  renderBlock1();
}
function unlinkCase(kind,idx,cid){
  var t=kind==='star' ? md().star : md().needImprove[idx];
  t.caseIds=(t.caseIds||[]).filter(function(x){ return x!==cid; });
  scheduleSave();
  renderBlock1();
}
function viewCase(cid){
  var c=caseById(cid);
  document.getElementById('caseViewTitle').textContent=c?('🎙️ '+caseTitle(c)):'案例';
  document.getElementById('caseViewBody').textContent=c?(c.text||''):'(案例已刪除)';
  document.getElementById('caseViewModal').classList.add('open');
}

// ════════ 渲染 ════════
function renderAll(){
  renderBlock1();
  renderLinkList('scripts');
  renderLinkList('hunts');
  renderFiles();
}

// ════════ 初始化 ════════
(async function init(){
  document.getElementById('whoLabel').textContent='👤 '+(charName()||'(未登入)')+'　·　每位主角各自一份';
  loadAll();
  updateMonthLabel();
  renderAll();
  await loadMpData();
  renderBlock1(); // mp_data 載入後重畫選單
})();

document.addEventListener('keydown',function(e){ if(e.key==='Escape'){ closeModal('casePickerModal'); closeModal('caseViewModal'); } });
document.addEventListener('visibilitychange',function(){ if(document.visibilityState==='hidden') saveAll(); });
window.addEventListener('pagehide',saveAll);
</script>

<script src="day-mode-init.js"></script>
